// Parse un CSV collé/importé → lignes {name,code,family,crit,year}
function parseMachinesCSV(text) {
  const lines = (text||"").split(/\r?\n/).filter(l=>l.trim());
  if (!lines.length) return {rows:[]};
  const cand = [";","\t",","];
  const sep = cand.map(s=>({s,n:(lines[0].split(s).length-1)})).sort((a,b)=>b.n-a.n)[0].s;
  const splitLine = l => {
    const out=[]; let cur="", q=false;
    for (let k=0;k<l.length;k++){
      const c=l[k];
      if (c==='"'){ if(q && l[k+1]==='"'){cur+='"';k++;} else q=!q; }
      else if (c===sep && !q){ out.push(cur); cur=""; }
      else cur+=c;
    }
    out.push(cur);
    return out.map(s=>s.trim());
  };
  const norm = s => (s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").trim();
  const header = splitLine(lines[0]).map(norm);
  const idx = names => header.findIndex(h=>names.includes(h));
  const iName=idx(["nom","name","machine","designation","libelle","intitule"]);
  const iCode=idx(["code","reference","ref","n parc","n° parc","numero","matricule"]);
  const iFam=idx(["famille","family","type","categorie"]);
  const iCrit=idx(["criticite","criticality","crit","importance","niveau"]);
  const iYear=idx(["annee","year","mise en service","date"]);
  const hasHeader = iName>=0 || iCode>=0 || iFam>=0;
  const critVal = v => {
    const n=norm(v);
    if (n.startsWith("critique")||n==="3") return 3;
    if (n.startsWith("import")||n==="2") return 2;
    if (n.startsWith("second")||n==="1") return 1;
    const num=parseInt(v); return (num>=1&&num<=3)?num:2;
  };
  const data = hasHeader ? lines.slice(1) : lines;
  const rows = data.map(l=>{
    const c=splitLine(l), g=i=>i>=0?(c[i]||""):"";
    return hasHeader
      ? {name:g(iName)||c[0], code:g(iCode), family:g(iFam), crit:critVal(g(iCrit)), year:g(iYear)}
      : {name:c[0]||"", code:c[1]||"", family:c[2]||"", crit:critVal(c[3]), year:c[4]||""};
  }).filter(r=>r.name);
  return {rows, sep, hasHeader};
}

const isoWeek = () => {
  const d = new Date();
  const t = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day = t.getUTCDay()||7; t.setUTCDate(t.getUTCDate()+4-day);
  const y0 = new Date(Date.UTC(t.getUTCFullYear(),0,1));
  return t.getUTCFullYear()+"-S"+String(Math.ceil((((t-y0)/864e5)+1)/7)).padStart(2,"0");
};

// Score de forme machine 0-100 (heuristique sans capteurs, façon Whoop)
function computeHealth(machine, its, plans) {
  const reasons = [];
  let score = 100;
  const now = Date.now();
  const cur30 = its.filter(i=>i.type==="curative" && now-new Date(i.reported_at)<30*864e5).length;
  const cur90 = its.filter(i=>i.type==="curative" && now-new Date(i.reported_at)<90*864e5).length;
  if (cur30>0) { const d=Math.min(36,cur30*12); score-=d; reasons.push(`${cur30} panne${cur30>1?"s":""} sur 30 jours (−${d})`); }
  const older = cur90-cur30;
  if (older>0) { const d=Math.min(12,older*4); score-=d; reasons.push(`${older} panne${older>1?"s":""} de plus sur 90 jours (−${d})`); }
  const late = plans.filter(p=>p.active && (p.next_due<=today() || planHoursDue(p,[machine]))).length;
  if (late>0) { const d=Math.min(30,late*15); score-=d; reasons.push(`${late} préventif${late>1?"s":""} en retard (−${d})`); }
  const counts = {};
  its.filter(i=>i.type==="curative" && i.failure_cause && now-new Date(i.reported_at)<90*864e5)
     .forEach(i=>{counts[i.failure_cause]=(counts[i.failure_cause]||0)+1;});
  const rec = Object.entries(counts).find(([,n])=>n>=3);
  if (rec) { score-=10; reasons.push(`cause récurrente : ${FAILCAUSE[rec[0]]?.label} ×${rec[1]} (−10)`); }
  if (machine.status==="alarm") { score-=15; reasons.push("machine actuellement en panne (−15)"); }
  if (machine.status==="degraded") { score-=8; reasons.push("en mode dégradé autorisé (−8)"); }
  score = Math.max(0, Math.min(100, score));
  return {score, reasons, color: score>=80?"var(--run)":score>=55?"var(--warn)":"var(--alarm)"};
}

/* ------------------------- ROOT + routing ------------------------- */
function Root() {
  const [hash,setHash] = useState(window.location.hash);
  useEffect(() => {
    const on = () => setHash(window.location.hash);
    window.addEventListener("hashchange", on);
    return () => window.removeEventListener("hashchange", on);
  }, []);
  // Pages publiques : #/qr/<token> (déclarer) et #/suivi/<token> (suivre) — sans compte
  const qrMatch = hash.match(/^#\/qr\/([0-9a-f-]{36})/i);
  if (qrMatch) return <QRPage token={qrMatch[1]}/>;
  const trackMatch = hash.match(/^#\/suivi\/([0-9a-f-]{36})/i);
  if (trackMatch) return <TrackPage token={trackMatch[1]}/>;
  return <AuthGate/>;
}

function AuthGate() {
  const [session,setSession] = useState(undefined);
  useEffect(() => {
    sb.auth.getSession().then(({data})=>setSession(data.session));
    const {data:{subscription}} = sb.auth.onAuthStateChange((_e,s)=>setSession(s));
    return () => subscription.unsubscribe();
  }, []);
  if (session === undefined) return <Center>Chargement…</Center>;
  if (!session) return <Login/>;
  return <App session={session}/>;
}

function Center({children}) {
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>{children}</div>;
}

/* ------------------------- PAGE PUBLIQUE QR ------------------------- */
function QRPage({token}) {
  const [machine,setMachine] = useState(undefined);
  const [name,setName] = useState("");
  const [desc,setDesc] = useState("");
  const [state,setState] = useState("form"); // form | sending | done | error
  const [track,setTrack] = useState(null);
  const [canRun,setCanRun] = useState(null); // true = peut tourner (dégradé), false = arrêtée (panne)
  const [rec,setRec] = useState(false);
  const recRef = useRef(null);
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  useEffect(() => () => { recRef.current?.stop(); recRef.current = null; }, []); // coupe le micro au démontage
  const dictate = () => {
    if (rec) { const r=recRef.current; recRef.current=null; setRec(false); r?.stop(); return; }
    const r = new SR();
    r.lang = "fr-FR"; r.continuous = true; r.interimResults = true;
    let base = desc ? desc+" " : "";
    r.onresult = e => {
      let final = base, interim = "";
      for (let k=e.resultIndex; k<e.results.length; k++) {
        if (e.results[k].isFinal) { final += e.results[k][0].transcript + " "; base = final; }
        else interim += e.results[k][0].transcript;
      }
      setDesc((final+interim).trim());
    };
    r.onend = () => setRec(false);
    r.onerror = () => setRec(false);
    recRef.current = r; r.start(); setRec(true);
  };
  const [session,setSession] = useState(undefined);
  const [techMode,setTechMode] = useState(false); // par défaut : déclaration opérateur ; le technicien passe par un bouton dédié
  useEffect(() => { (async () => {
    const {data,error} = await sb.rpc("qr_get_machine",{qr:token});
    setMachine(error || !data?.length ? null : data[0]);
    const {data:s} = await sb.auth.getSession();
    setSession(s.session || null);
  })(); }, []);
  const [photo,setPhoto] = useState(null);
  const send = async () => {
    setState("sending");
    let path = null;
    if (photo) {
      path = `qr/${machine.id}/${Date.now()}_${photo.name.replace(/[^a-zA-Z0-9._-]/g,"_")}`;
      const {error:e1} = await sb.storage.from("docs").upload(path, photo);
      if (e1) path = null; // la déclaration part quand même, sans photo
    }
    const {data,error} = await sb.rpc("qr_declare",{qr:token, p_title:desc, p_name:name, p_can_run:canRun===true, p_photo:path});
    if (!error && data) setTrack(data);
    setState(error ? "error" : "done");
  };
  if (machine === undefined) return <Center>Chargement…</Center>;
  if (machine === null) return <Center><div style={{font:"600 14px system-ui",color:"var(--alarm)"}}>QR code invalide ou machine supprimée.</div></Center>;
  // Technicien connecté : espace intervention (dictée directe) au lieu de la déclaration opérateur
  if (session && techMode) return <QRTechPanel machine={machine} session={session} onDeclare={()=>setTechMode(false)}/>;
  return (
    <Center>
      <div style={{background:"#fff",padding:28,width:420,maxWidth:"94vw",borderTop:"5px solid var(--accent)"}}>
        <div style={{fontFamily:"var(--display)",fontSize:18,marginBottom:2}}>
          <span style={{color:"var(--accent)"}}>▮▮</span> MAINT<span style={{color:"var(--accent)"}}>X</span>
        </div>
        <div style={{font:"600 11px system-ui",textTransform:"uppercase",letterSpacing:".1em",color:"var(--muted)",marginBottom:20}}>
          Signaler une panne · {machine.org_name}
        </div>
        <div style={{background:"var(--bg)",padding:"12px 16px",marginBottom:18}}>
          <div style={{font:"700 10px ui-monospace,monospace",color:"var(--muted)",textTransform:"uppercase"}}>{machine.code} · {machine.family}</div>
          <div style={{fontWeight:800,fontSize:17}}>{machine.name}</div>
        </div>
        {state === "done" ? (
          <div style={{textAlign:"center",padding:"20px 0 8px"}}>
            <div style={{width:52,height:52,borderRadius:"50%",background:"var(--run)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",font:"700 28px system-ui",margin:"0 auto 12px"}}>✓</div>
            <div style={{font:"700 16px system-ui",color:"var(--run)"}}>Panne déclarée</div>
            <div style={{font:"500 13px system-ui",color:"var(--muted)",marginTop:6}}>L'équipe maintenance est prévenue.</div>
            {track && (
              <>
                <a className="btn" style={{display:"block",textAlign:"center",textDecoration:"none",marginTop:18,padding:"14px"}} href={"#/suivi/"+track}>
                  Suivre la réparation
                </a>
                <div style={{font:"500 11px system-ui",color:"var(--muted)",marginTop:8}}>
                  Gardez ce lien : il vous montre l'avancement en direct, sans compte.
                </div>
              </>
            )}
          </div>
        ) : (
          <>
            <label style={{font:"600 12px system-ui",display:"block",marginBottom:6}}>Que se passe-t-il ?</label>
            <textarea placeholder="Ex : alarme broche, fuite d'huile, bruit anormal…" rows={3}
                      value={desc} onChange={e=>setDesc(e.target.value)} style={{marginBottom:8}}/>
            {SR && (
              <button type="button" className="btn ghost sm" style={{width:"100%",marginBottom:14,...(rec?{borderColor:"var(--alarm)",color:"var(--alarm)"}:{})}} onClick={dictate}>
                {rec ? "Arrêter la dictée" : "Décrire à la voix"}
              </button>
            )}
            <label className="btn ghost sm" style={{display:"block",width:"100%",textAlign:"center",marginBottom:14,cursor:"pointer"}}>
              {photo ? "Photo ajoutée : "+(photo.name.length>22?photo.name.slice(0,22)+"…":photo.name) : "Ajouter une photo (optionnel)"}
              <input type="file" accept="image/*" capture="environment" style={{display:"none"}}
                     onChange={e=>setPhoto(e.target.files[0]||null)}/>
            </label>
            <div style={{font:"600 12px system-ui",marginBottom:6}}>La machine peut-elle encore tourner ?</div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <button type="button" onClick={()=>setCanRun(false)}
                      style={{flex:1,padding:"12px 6px",cursor:"pointer",font:"700 13px system-ui",display:"flex",alignItems:"center",justifyContent:"center",gap:8,
                              border:canRun===false?"2px solid var(--alarm)":"1.5px solid #D5D8DC",
                              background:canRun===false?"#FDECEA":"#fff",color:canRun===false?"var(--alarm)":"var(--ink)"}}>
                <span style={{width:12,height:12,background:"var(--alarm)",borderRadius:2,flex:"none"}}/> Non, arrêtée
              </button>
              <button type="button" onClick={()=>setCanRun(true)}
                      style={{flex:1,padding:"12px 6px",cursor:"pointer",font:"700 13px system-ui",display:"flex",alignItems:"center",justifyContent:"center",gap:8,
                              border:canRun===true?"2px solid var(--warn)":"1.5px solid #D5D8DC",
                              background:canRun===true?"#FFF7DB":"#fff",color:"var(--ink)"}}>
                <span style={{width:12,height:12,background:"var(--warn)",borderRadius:2,flex:"none"}}/> Oui, elle tourne
              </button>
            </div>
            <input placeholder="Votre nom (optionnel)" value={name} onChange={e=>setName(e.target.value)} style={{marginBottom:14}}/>
            {state === "error" && <div style={{color:"var(--alarm)",font:"600 12px system-ui",marginBottom:10}}>Erreur d'envoi — réessayez.</div>}
            <button className="btn" style={{width:"100%",padding:"14px"}} disabled={!desc || canRun===null || state==="sending"} onClick={send}>
              {state === "sending" ? "Envoi…" : "Déclarer la panne"}
            </button>
            <div style={{borderTop:"1px solid #EEE",marginTop:18,paddingTop:12,textAlign:"center"}}>
              <a style={{font:"600 12px system-ui",color:"var(--muted)",cursor:"pointer",textDecoration:"none"}}
                 onClick={()=> session ? setTechMode(true) : (window.location.hash="")}>
                {session ? "Accéder à l'espace technicien →" : "Vous êtes technicien ? Se connecter →"}
              </a>
            </div>
          </>
        )}
      </div>
    </Center>
  );
}

/* ------------------------- PAGE PUBLIQUE SUIVI (pizza tracker) ------------------------- */
function TrackPage({token}) {
  const [t,setT] = useState(undefined);
  useEffect(() => {
    const load = async () => {
      const {data,error} = await sb.rpc("qr_track",{token});
      setT(error || !data?.length ? null : data[0]);
    };
    load();
    const iv = setInterval(load, 30000); // rafraîchit tout seul
    return () => clearInterval(iv);
  }, []);
  if (t === undefined) return <Center>Chargement…</Center>;
  if (t === null) return <Center><div style={{font:"600 14px system-ui",color:"var(--alarm)"}}>Lien de suivi invalide.</div></Center>;
  const fmt = d => d ? d.slice(0,16).replace("T"," à ") : null;
  const seen = !!(t.acked_at || t.started_at || ["in_progress","waiting_parts","done"].includes(t.status));
  const steps = [
    {label:"Panne déclarée", done:true, at:fmt(t.reported_at), desc:"L'équipe maintenance est prévenue."},
    {label:"Prise en compte", done:seen, at:fmt(t.acked_at), desc:"Le technicien a vu votre signalement, la réparation sera planifiée."},
    t.status==="waiting_parts"
      ? {label:"En attente de pièces", done:true, at:null, desc:"La réparation reprendra à réception des pièces."}
      : {label:"Réparation en cours", done:t.status==="in_progress"||t.status==="done"||!!t.started_at, at:fmt(t.started_at), desc:"Un technicien est sur la machine."},
    {label:"Machine réparée", done:t.status==="done", at:fmt(t.finished_at), desc:"C'est terminé, merci d'avoir prévenu !"},
  ];
  return (
    <Center>
      <div style={{background:"#fff",padding:28,width:420,maxWidth:"94vw",borderTop:"5px solid var(--accent)"}}>
        <div style={{fontFamily:"var(--display)",fontSize:18,marginBottom:2}}>
          <span style={{color:"var(--accent)"}}>▮▮</span> MAINT<span style={{color:"var(--accent)"}}>X</span>
        </div>
        <div style={{font:"600 11px system-ui",textTransform:"uppercase",letterSpacing:".1em",color:"var(--muted)",marginBottom:18}}>
          Suivi de réparation
        </div>
        <div style={{background:"var(--bg)",padding:"12px 16px",marginBottom:20}}>
          <div style={{font:"700 10px ui-monospace,monospace",color:"var(--muted)",textTransform:"uppercase"}}>{t.machine_code||"—"}</div>
          <div style={{fontWeight:800,fontSize:16}}>{t.machine_name}</div>
          <div style={{font:"500 13px system-ui",color:"var(--muted)",marginTop:4}}>{t.title}</div>
        </div>
        {steps.map((s,k)=>(
          <div key={k} style={{display:"flex",gap:14,alignItems:"flex-start",paddingBottom:k<steps.length-1?22:0,position:"relative"}}>
            {k<steps.length-1 && <div style={{position:"absolute",left:7,top:36,bottom:0,width:2,background:s.done?"var(--run)":"#D5D8DC"}}/>}
            <span className={"lamp"+(!s.done&&k===steps.findIndex(x=>!x.done)?" blink":"")}
                  style={{background:s.done?"var(--run)":"#D5D8DC",width:16,height:34,flexShrink:0}}/>
            <div>
              <div style={{font:s.done?"800 15px system-ui":"600 15px system-ui",color:s.done?"var(--ink)":"var(--muted)"}}>{s.label}</div>
              {s.at && <div style={{font:"500 12px system-ui",color:"var(--muted)"}}>{s.at}</div>}
              {s.done && <div style={{font:"500 12px system-ui",color:"var(--muted)",marginTop:2}}>{s.desc}</div>}
            </div>
          </div>
        ))}
        <div style={{font:"500 11px system-ui",color:"var(--muted)",marginTop:22,textAlign:"center"}}>
          Cette page se met à jour automatiquement.
        </div>
      </div>
    </Center>
  );
}

/* ------------------------- LOGIN ------------------------- */
function Login() {
  const [mode,setMode] = useState("login"); // login | signup
  const [email,setEmail] = useState("");
  const [pwd,setPwd] = useState("");
  const [name,setName] = useState("");
  const [company,setCompany] = useState("");
  const [err,setErr] = useState(null);
  const [busy,setBusy] = useState(false);
  const [signedUp,setSignedUp] = useState(false);
  const go = async () => {
    setBusy(true); setErr(null);
    const {error} = await sb.auth.signInWithPassword({email, password:pwd});
    if (error) setErr("Identifiants incorrects ou compte inexistant.");
    setBusy(false);
  };
  const register = async () => {
    setBusy(true); setErr(null);
    const {error} = await sb.auth.signUp({email, password:pwd,
      options:{data:{full_name:name, requested_org:company}}});
    if (error) setErr(error.message.includes("registered") ? "Un compte existe déjà avec cet email." : error.message);
    else setSignedUp(true);
    setBusy(false);
  };
  if (signedUp) return (
    <Center>
      <div style={{background:"#fff",padding:32,width:400,maxWidth:"94vw",borderTop:"5px solid var(--accent)",textAlign:"center"}}>
        <div style={{fontSize:40}}>✓</div>
        <div style={{font:"800 17px system-ui",marginTop:4}}>Demande envoyée</div>
        <div style={{font:"500 13px system-ui",color:"var(--muted)",margin:"10px 0 18px"}}>
          Votre compte est en attente de validation par MaintX. Vous pourrez vous connecter une fois qu'il aura été autorisé.
        </div>
        <button className="btn" style={{width:"100%"}} onClick={()=>{setMode("login");setSignedUp(false);}}>Retour à la connexion</button>
      </div>
    </Center>
  );
  return (
    <Center>
      <div style={{background:"#fff",padding:32,width:380,maxWidth:"94vw",borderTop:"5px solid var(--accent)"}}>
        <div style={{fontFamily:"var(--display)",fontSize:24,marginBottom:4}}>
          <span style={{color:"var(--accent)"}}>▮▮</span> MAINT<span style={{color:"var(--accent)"}}>X</span>
        </div>
        <div style={{font:"600 11px system-ui",textTransform:"uppercase",letterSpacing:".1em",color:"var(--muted)",marginBottom:24}}>
          GMAO · {mode==="login"?"Connexion":"Créer un compte"}
        </div>
        {mode==="signup" && <>
          <input placeholder="Nom et prénom" value={name} onChange={e=>setName(e.target.value)} style={{marginBottom:10}}/>
          <input placeholder="Nom de votre entreprise" value={company} onChange={e=>setCompany(e.target.value)} style={{marginBottom:10}}/>
        </>}
        <input placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} style={{marginBottom:10}}/>
        <input placeholder="Mot de passe" type="password" value={pwd} onChange={e=>setPwd(e.target.value)}
               onKeyDown={e=>e.key==="Enter"&&(mode==="login"?go():register())} style={{marginBottom:14}}/>
        {err && <div style={{color:"var(--alarm)",font:"600 12px system-ui",marginBottom:12}}>{err}</div>}
        {mode==="login" ? (
          <button className="btn" style={{width:"100%"}} disabled={busy||!email||!pwd} onClick={go}>{busy?"Connexion…":"Se connecter"}</button>
        ) : (
          <button className="btn" style={{width:"100%"}} disabled={busy||!email||!pwd||!name} onClick={register}>{busy?"Envoi…":"Créer mon compte"}</button>
        )}
        <div style={{font:"500 12px system-ui",color:"var(--muted)",marginTop:16,textAlign:"center"}}>
          {mode==="login" ? (
            <>Pas encore de compte ? <a style={{color:"var(--ink)",fontWeight:700,cursor:"pointer"}} onClick={()=>{setMode("signup");setErr(null);}}>Créer un compte</a></>
          ) : (
            <>Déjà un compte ? <a style={{color:"var(--ink)",fontWeight:700,cursor:"pointer"}} onClick={()=>{setMode("login");setErr(null);}}>Se connecter</a></>
          )}
        </div>
      </div>
    </Center>
  );
}

/* ------------------------- APP ------------------------- */
function App({session}) {
  const [profile,setProfile] = useState(null);
  const [orgs,setOrgs] = useState([]);
  const [orgId,setOrgId] = useState(null);
  const [machines,setMachines] = useState([]);
  const [interventions,setInterventions] = useState([]);
  const [preventifs,setPreventifs] = useState([]);
  const [docs,setDocs] = useState([]);
  const [parts,setParts] = useState([]);
  const [view,setView] = useState({name:"dashboard"});
  const [modal,setModal] = useState(null);
  const [error,setError] = useState(null);
  const [navOpen,setNavOpen] = useState(false);
  const [pendingProfiles,setPendingProfiles] = useState([]);

  const isSuper = profile?.role === "superadmin";
  const org = orgs.find(o=>o.id===orgId);

  const loadPending = async () => {
    const {data} = await sb.from("profiles").select("*").eq("pending",true).order("created_at");
    setPendingProfiles(data||[]);
  };
  useEffect(() => { (async () => {
    const {data:p,error:e1} = await sb.from("profiles").select("*").eq("id",session.user.id).single();
    if (e1 || !p) { setError("Profil introuvable. Votre inscription a peut-être été refusée — contactez MaintX."); return; }
    setProfile(p);
    if (p.pending) return; // compte en attente : on ne charge pas l'app
    // Le technicien atterrit direct sur les interventions (le reste reste accessible par le menu)
    if (p.role === "technician") setView({name:"interventions"});
    const {data:o} = await sb.from("organizations").select("*").order("name");
    setOrgs(o||[]);
    setOrgId(p.org_id || (o&&o[0]?.id) || null);
    if (p.role === "superadmin") loadPending();
  })(); }, []);

  const refresh = async () => {
    if (!orgId) return;
    const [m,i,p,d,pa] = await Promise.all([
      sb.from("machines").select("*").eq("org_id",orgId).order("code"),
      sb.from("interventions").select("*").eq("org_id",orgId).is("duplicate_of",null).order("reported_at",{ascending:false}),
      sb.from("preventive_plans").select("*").eq("org_id",orgId).order("next_due"),
      sb.from("machine_documents").select("*").eq("org_id",orgId).order("created_at",{ascending:false}),
      sb.from("parts").select("*").eq("org_id",orgId).order("name"),
    ]);
    setMachines(m.data||[]); setInterventions(i.data||[]); setPreventifs(p.data||[]); setDocs(d.data||[]); setParts(pa.data||[]);
  };
  useEffect(() => { refresh(); }, [orgId]);

  /* --- Actions --- */
  const db = {
    addMachine: async f => { await sb.from("machines").insert({org_id:orgId,name:f.name,code:f.code,family:f.family,criticality:f.crit,meta:{year:f.year,specs:{}}}); refresh(); setModal(null); },
    importMachines: async rows => {
      const payload = rows.map(r=>({org_id:orgId,name:r.name,code:r.code||null,family:r.family||null,criticality:r.crit||2,meta:{year:r.year||"",specs:{}}}));
      const {error} = await sb.from("machines").insert(payload);
      if (error) { alert("Erreur import : "+error.message); return false; }
      refresh(); return true;
    },
    updateMachineMeta: async (id,meta) => { await sb.from("machines").update({meta}).eq("id",id); refresh(); },
    addIntervention: async f => { await sb.from("interventions").insert({org_id:orgId,machine_id:f.machine,type:f.type,priority:f.prio,title:f.title,reported_by:profile.id}); refresh(); setModal(null); },
    setInterventionStatus: async (i,st) => {
      const patch = {status:st};
      if (st!=="open" && !i.acked_at) patch.acked_at = new Date().toISOString();
      if (st==="in_progress" && !i.started_at) patch.started_at = new Date().toISOString();
      if (st==="done") patch.finished_at = new Date().toISOString();
      else if (i.finished_at) patch.finished_at = null; // réouverture : on efface la date de clôture
      if (st==="open") patch.started_at = null;         // remise en file d'attente
      await sb.from("interventions").update(patch).eq("id",i.id); refresh();
    },
    ackIntervention: async i => { await sb.from("interventions").update({acked_at:new Date().toISOString()}).eq("id",i.id); refresh(); },
    deleteIntervention: async i => {
      if (!confirm(`Supprimer l'intervention "${i.title}" ? (photos et commentaires inclus)`)) return;
      // supprimer d'abord les doublons fusionnés rattachés (sinon ils réapparaissent)
      await sb.from("interventions").delete().eq("duplicate_of",i.id);
      const {error} = await sb.from("interventions").delete().eq("id",i.id);
      if (error) { alert("Suppression impossible : "+error.message); return; }
      refresh();
    },
    triage: async (i,st) => {
      const patch = {triage:st};
      if (st==="deferred") patch.priority = 1;
      await sb.from("interventions").update(patch).eq("id",i.id); refresh();
    },
    triageReject: async i => {
      if (!confirm("Rejeter ce signalement (fausse alerte) ? La machine repassera en marche.")) return;
      await sb.from("interventions").update({triage:"rejected",status:"done",finished_at:new Date().toISOString()}).eq("id",i.id);
      await sb.from("machines").update({status:"running",degraded_conditions:null,degraded_deadline:null}).eq("id",i.machine_id).in("status",["alarm","degraded"]);
      refresh();
    },
    triageDuplicate: async (i,masterId) => {
      await sb.from("interventions").update({duplicate_of:masterId,triage:"merged"}).eq("id",i.id); refresh();
    },
    setOrgLogo: async (id,url) => {
      await sb.from("organizations").update({logo_url:url||null}).eq("id",id);
      const {data:o} = await sb.from("organizations").select("*").order("name");
      setOrgs(o||[]);
    },
    saveWeeklyBrief: async (week,text) => {
      await sb.from("organizations").update({settings:{...(org?.settings||{}),weekly_brief:{week,text}}}).eq("id",orgId);
      const {data:o} = await sb.from("organizations").select("*").order("name");
      setOrgs(o||[]);
    },
    setMachineStatus: async (id,st) => { await sb.from("machines").update({status:st,degraded_conditions:null,degraded_deadline:null}).eq("id",id); refresh(); },
    setDegraded: async (id,conditions,deadline) => { await sb.from("machines").update({status:"degraded",degraded_conditions:conditions,degraded_deadline:deadline}).eq("id",id); refresh(); },
    setInterventionCause: async (id,cause) => { await sb.from("interventions").update({failure_cause:cause}).eq("id",id); refresh(); },
    addPart: async f => { await sb.from("parts").insert({org_id:orgId,name:f.name,ref:f.ref||null,location:f.location||null,qty:+f.qty||0,min_qty:+f.min_qty||0,unit_cost:f.unit_cost?+f.unit_cost:null}); refresh(); setModal(null); },
    adjustPart: async (p,delta) => { await sb.from("parts").update({qty:Math.max(0,+p.qty+delta)}).eq("id",p.id); refresh(); },
    deletePart: async p => {
      if (!confirm(`Supprimer la pièce "${p.name}" ?`)) return;
      await sb.from("parts").delete().eq("id",p.id); refresh();
    },
    usePart: async (i,part,qty) => {
      const cost = part.unit_cost ? Math.round(+part.unit_cost*qty*100)/100 : null;
      // on relit stock et parts_used à jour pour éviter d'écraser une saisie concurrente
      const [{data:freshPart},{data:freshInt}] = await Promise.all([
        sb.from("parts").select("qty").eq("id",part.id).single(),
        sb.from("interventions").select("parts_used").eq("id",i.id).single(),
      ]);
      await sb.from("parts").update({qty:Math.max(0,+(freshPart?.qty??part.qty)-qty)}).eq("id",part.id);
      await sb.from("interventions").update({parts_used:[...(freshInt?.parts_used||i.parts_used||[]),{part_id:part.id,ref:part.ref,name:part.name,qty,cost}]}).eq("id",i.id);
      refresh();
    },
    setMeterHours: async (id,hours) => { await sb.from("machines").update({meter_hours:hours}).eq("id",id); refresh(); },
    saveHourlyRate: async v => {
      await sb.from("organizations").update({settings:{...(org?.settings||{}),hourly_rate:+v||0}}).eq("id",orgId);
      const {data:o} = await sb.from("organizations").select("*").order("name");
      setOrgs(o||[]);
    },
    fetchDejaVu: async i => {
      const {data} = await sb.from("interventions").select("*")
        .eq("machine_id",i.machine_id).eq("type","curative").eq("status","done")
        .neq("id",i.id).is("duplicate_of",null)
        .order("reported_at",{ascending:false}).limit(10);
      const past = data||[];
      // Priorité aux titres qui partagent des mots avec la panne actuelle
      const words = (i.title||"").toLowerCase().split(/[^a-zà-ÿ0-9]+/).filter(w=>w.length>3);
      const score = p => words.filter(w=>(p.title||"").toLowerCase().includes(w)).length;
      return past.map(p=>({p,s:score(p)})).sort((a,b)=>b.s-a.s || new Date(b.p.reported_at)-new Date(a.p.reported_at))
                 .slice(0,3).map(x=>x.p);
    },
    fetchMachineComments: async ids => {
      if (!ids.length) return [];
      const {data} = await sb.from("intervention_comments").select("*, author:profiles(full_name)").in("intervention_id",ids).order("created_at",{ascending:false});
      return data || [];
    },
    fetchComments: async iid => {
      const {data} = await sb.from("intervention_comments").select("*, author:profiles(full_name)").eq("intervention_id",iid).order("created_at");
      return data || [];
    },
    addComment: async (iid,body) => { await sb.from("intervention_comments").insert({org_id:orgId,intervention_id:iid,author_id:profile.id,body}); },
    uploadPhoto: async (i,file) => {
      const path = `${orgId}/${i.machine_id}/interventions/${i.id}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,"_")}`;
      const {error:e1} = await sb.storage.from("docs").upload(path, file);
      if (e1) { alert("Erreur upload : "+e1.message); return; }
      await sb.from("interventions").update({photos:[...(i.photos||[]),{path,name:file.name}]}).eq("id",i.id);
      refresh();
    },
    openPhoto: async path => {
      const {data,error} = await sb.storage.from("docs").createSignedUrl(path, 3600);
      if (error) { alert("Erreur d'accès à la photo"); return; }
      window.open(data.signedUrl, "_blank");
    },
    approveProfile: async (pid, org_id, role) => {
      await sb.from("profiles").update({org_id, role, pending:false}).eq("id",pid);
      loadPending();
    },
    rejectProfile: async pid => {
      if (!confirm("Refuser cette demande ? La personne ne pourra pas accéder à MaintX.")) return;
      await sb.from("profiles").delete().eq("id",pid);
      loadPending();
    },
    addOrg: async name => {
      const slug = name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
      await sb.from("organizations").insert({name,slug});
      const {data:o} = await sb.from("organizations").select("*").order("name");
      setOrgs(o||[]); setModal(null);
    },
    reloadOrgs: async () => { const {data:o} = await sb.from("organizations").select("*").order("name"); setOrgs(o||[]); },
    setOrgPlan: async (id,plan) => { await sb.from("organizations").update({plan}).eq("id",id); const {data:o}=await sb.from("organizations").select("*").order("name"); setOrgs(o||[]); },
    fetchOrgMembers: async oid => {
      const {data} = await sb.from("profiles").select("*").eq("org_id",oid).order("full_name");
      return data || [];
    },
    setProfileRole: async (pid,role) => { await sb.from("profiles").update({role}).eq("id",pid); },
    removeFromOrg: async pid => {
      if (!confirm("Retirer cette personne de l'usine ? Elle repassera en attente d'affectation.")) return false;
      await sb.from("profiles").update({org_id:null,pending:true}).eq("id",pid);
      loadPending(); return true;
    },
    fetchZones: async oid => {
      const {data} = await sb.from("zones").select("*").eq("org_id",oid).order("name");
      return data || [];
    },
    addZone: async (oid,name) => { await sb.from("zones").insert({org_id:oid,name}); },
    deleteZone: async zid => {
      if (!confirm("Supprimer cet atelier / cette zone ?")) return false;
      await sb.from("zones").delete().eq("id",zid); return true;
    },
    addPreventif: async f => {
      const ids = f.machines?.length ? f.machines : (f.machine ? [f.machine] : []);
      const rows = ids.map(mid=>{
        const m = machines.find(x=>x.id===mid);
        return {org_id:orgId,machine_id:mid,title:f.title,freq_days:f.freq,next_due:f.next,checklist:(f.checklist||[]).map(s=>({step:s})),freq_hours:f.freqH?+f.freqH:null,last_done_hours:m?+m.meter_hours:0};
      });
      if (rows.length) await sb.from("preventive_plans").insert(rows);
      refresh(); setModal(null);
    },
    donePreventif: async (p,steps) => {
      const m = machines.find(x=>x.id===p.machine_id);
      // freq_days = 0 → tâche ponctuelle : on la désactive au lieu de la replanifier
      const patch = +p.freq_days>0
        ? {next_due:addDays(today(),p.freq_days), last_done_hours:m?+m.meter_hours:+p.last_done_hours}
        : {active:false};
      await sb.from("preventive_plans").update(patch).eq("id",p.id);
      const desc = steps?.length ? "Checklist :\n"+steps.map(s=>(s.done?"✓ ":"✗ ")+s.step).join("\n") : null;
      await sb.from("interventions").insert({org_id:orgId,machine_id:p.machine_id,type:"preventive",priority:1,title:p.title,description:desc,status:"done",reported_by:profile.id,started_at:new Date().toISOString(),finished_at:new Date().toISOString()});
      refresh();
    },
    donePreventifBatch: async plans => {
      if (!plans.length) return;
      if (!confirm(`Valider « ${plans[0].title} » sur ${plans.length} machine(s) ?`)) return;
      const now = new Date().toISOString();
      for (const p of plans) {
        const m = machines.find(x=>x.id===p.machine_id);
        const patch = +p.freq_days>0
          ? {next_due:addDays(today(),p.freq_days), last_done_hours:m?+m.meter_hours:+p.last_done_hours}
          : {active:false};
        await sb.from("preventive_plans").update(patch).eq("id",p.id);
        const desc = p.checklist?.length ? "Checklist (validée en lot) :\n"+p.checklist.map(s=>"✓ "+(s.step||s)).join("\n") : null;
        await sb.from("interventions").insert({org_id:orgId,machine_id:p.machine_id,type:"preventive",priority:1,title:p.title,description:desc,status:"done",reported_by:profile.id,started_at:now,finished_at:now});
      }
      refresh();
    },
    uploadDoc: async (machineId, file, category) => {
      const path = `${orgId}/${machineId}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,"_")}`;
      const {error:e1} = await sb.storage.from("docs").upload(path, file);
      if (e1) { alert("Erreur upload : "+e1.message); return; }
      await sb.from("machine_documents").insert({org_id:orgId,machine_id:machineId,category,name:file.name,storage_path:path,uploaded_by:profile.id});
      refresh();
    },
    ingestDoc: async (d, silent) => {
      try {
        if (!window.pdfjsLib) throw new Error("pdf.js non chargé (rechargez la page)");
        const {data:blob,error:e0} = await sb.storage.from("docs").download(d.storage_path);
        if (e0 || !blob) throw new Error("téléchargement du PDF impossible");
        const buf = new Uint8Array(await blob.arrayBuffer());
        const pdf = await window.pdfjsLib.getDocument({data:buf}).promise;
        const chunks = [];
        for (let pg=1; pg<=pdf.numPages; pg++) {
          const page = await pdf.getPage(pg);
          const content = await page.getTextContent();
          const clean = content.items.map(it=>it.str).join(" ").replace(/\s+/g," ").trim();
          if (clean.length < 30) continue; // page vide ou scannée sans texte
          for (let k=0; k<clean.length; k+=1100) chunks.push({page:pg, content:clean.slice(k,k+1250)});
        }
        await sb.from("doc_chunks").delete().eq("document_id",d.id);
        for (let k=0; k<chunks.length; k+=200) {
          const rows = chunks.slice(k,k+200).map(c=>({org_id:d.org_id,machine_id:d.machine_id,document_id:d.id,doc_name:d.name,page:c.page,content:c.content}));
          const {error:e3} = await sb.from("doc_chunks").insert(rows);
          if (e3) throw new Error("insertion : "+e3.message);
        }
        await sb.from("machine_documents").update({indexed_at:new Date().toISOString()}).eq("id",d.id);
        refresh();
        if (!silent) alert(chunks.length ? `${chunks.length} extrait(s) indexé(s) — Mécano peut lire « ${d.name} ».`
                                         : "Aucun texte lisible (PDF scanné ?) — Mécano ne pourra pas s'en servir.");
      } catch(e) {
        if (!silent) alert("Indexation impossible : "+(e.message||e));
      }
    },
    askMecano: async (machine, question) => {
      const {data:{session}} = await sb.auth.getSession();
      const res = await fetch(FN.ask, {
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+session.access_token,"apikey":SUPABASE_KEY},
        body:JSON.stringify({machine_id:machine.id, machine_name:machine.name, question}),
      });
      const p = await res.json();
      if (!res.ok || p.error) throw new Error(p.error||res.status);
      return p;
    },
    setDocCategory: async (d,cat) => { await sb.from("machine_documents").update({category:cat}).eq("id",d.id); refresh(); },
    addDocLink: async (machineId, url, name, category) => {
      await sb.from("machine_documents").insert({org_id:orgId,machine_id:machineId,category,name,storage_path:url,uploaded_by:profile.id});
      refresh();
    },
    openDoc: async d => {
      if (d.storage_path?.startsWith("http")) { window.open(d.storage_path, "_blank"); return; }
      const {data,error} = await sb.storage.from("docs").createSignedUrl(d.storage_path, 3600);
      if (error) { alert("Erreur d'accès au document"); return; }
      window.open(data.signedUrl, "_blank");
    },
    deleteDoc: async d => {
      if (!confirm(`Supprimer "${d.name}" ?`)) return;
      if (!d.storage_path?.startsWith("http")) await sb.storage.from("docs").remove([d.storage_path]);
      await sb.from("machine_documents").delete().eq("id",d.id);
      refresh();
    },
  };

  /* --- KPI --- */
  const kpi = useMemo(() => {
    const pannes = machines.filter(m=>m.status==="alarm").length;
    const pending = interventions.filter(i=>i.triage==="pending").length;
    const ouvertes = interventions.filter(i=>i.status!=="done" && i.triage!=="pending").length;
    const done = interventions.filter(i=>i.started_at && i.finished_at);
    const mttr = done.length ? Math.round(done.reduce((a,i)=>a+(new Date(i.finished_at)-new Date(i.started_at))/60000,0)/done.length) : null;
    const retard = preventifs.filter(p=>p.active && (p.next_due<=today() || planHoursDue(p,machines))).length;
    const lowStock = parts.filter(partLow).length;
    const d90 = new Date(Date.now()-90*864e5).toISOString();
    const counts = {};
    interventions.filter(i=>i.type==="curative" && i.reported_at>d90).forEach(i=>{counts[i.machine_id]=(counts[i.machine_id]||0)+1;});
    const chroniques = Object.entries(counts).filter(([,n])=>n>=3).map(([mid,n])=>({mid,m:machines.find(x=>x.id===mid),n}));
    return {pannes,ouvertes,mttr,retard,chroniques,lowStock,pending};
  }, [machines,interventions,preventifs,parts]);

  const machineName = id => machines.find(m=>m.id===id)?.name || "?";

  if (error) return <Center><div style={{textAlign:"center"}}><div style={{color:"var(--alarm)",font:"600 14px system-ui",marginBottom:16}}>{error}</div><button className="btn" onClick={()=>sb.auth.signOut()}>Se déconnecter</button></div></Center>;
  if (profile && profile.pending) return (
    <Center>
      <div style={{background:"#fff",padding:32,width:400,maxWidth:"94vw",borderTop:"5px solid var(--accent)",textAlign:"center"}}>
        <div style={{fontSize:40}}>⏳</div>
        <div style={{font:"800 17px system-ui",marginTop:4}}>Compte en attente de validation</div>
        <div style={{font:"500 13px system-ui",color:"var(--muted)",margin:"10px 0 18px"}}>
          Bonjour {profile.full_name}. Votre accès n'a pas encore été autorisé par MaintX. Vous recevrez l'accès dès validation.
        </div>
        <button className="btn" onClick={()=>sb.auth.signOut()}>Se déconnecter</button>
      </div>
    </Center>
  );
  if (!profile || !orgId) return <Center>Chargement…</Center>;

  const ITEM = {
    dashboard:{label:"Accueil",ico:"fa-gauge-high",badge:kpi.pannes,color:"var(--alarm)"},
    interventions:{label:"Interventions",ico:"fa-screwdriver-wrench",badge:kpi.ouvertes+kpi.pending,color:kpi.pending>0?"var(--accent)":"#3B4048"},
    parc:{label:"Machines",ico:"fa-gears"},
    preventif:{label:"Préventif",ico:"fa-calendar-check",badge:kpi.retard,color:"var(--alarm)"},
    pieces:{label:"Pièces détachées",ico:"fa-box",badge:kpi.lowStock,color:"var(--warn)"},
    analyse:{label:"Analyse",ico:"fa-chart-line"},
    admin:{label:"Clients & accès",ico:"fa-users",badge:pendingProfiles.length,color:"var(--accent)"},
  };
  const PRIMARY = ["dashboard","interventions","parc","preventif"];       // barre du bas mobile
  const SECONDARY = ["pieces","analyse",...(isSuper?["admin"]:[])]; // menu "Plus"
  const NavBtn = k => {
    const it = ITEM[k];
    return (
      <button key={k} className={"nav"+(view.name===k?" active":"")} onClick={()=>{setView({name:k});setNavOpen(false);}}>
        <span className="ico">{it.ico}</span>{it.label}
        {it.badge>0 && <span className="navbadge" style={{background:it.color,color:it.color==="var(--accent)"?"var(--ink)":"#fff"}}>{it.badge}</span>}
      </button>
    );
  };

  const TOPNAV = ["dashboard","interventions","preventif","parc","pieces","analyse",...(isSuper?["admin"]:[])];
  return (
    <div className="layout" style={{display:"flex",flexDirection:"column",minHeight:"100vh"}}>
      <div className="mobilebar">
        <div style={{fontFamily:"var(--display)",fontSize:17,color:"#fff",flex:1}}>
          <span style={{color:"var(--accent)",marginRight:5}}>▮▮</span>MAINT<span style={{color:"var(--accent)"}}>X</span>
        </div>
        <span style={{color:"#AEB2B9",font:"600 12px system-ui",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:170}}>{org?.name}</span>
      </div>
      <header className="topnav">
        <div style={{fontFamily:"var(--display)",fontSize:18,color:"#fff",marginRight:8}}>
          <span style={{color:"var(--accent)",marginRight:5}}>▮▮</span>MAINT<span style={{color:"var(--accent)"}}>X</span>
        </div>
        <nav style={{display:"flex",gap:2,flex:1,overflowX:"auto"}}>
          {TOPNAV.map(k=>{
            const it = ITEM[k];
            return (
              <button key={k} className={"tnav"+(view.name===k?" active":"")} onClick={()=>setView({name:k})}>
                <i className={"fa-solid "+it.ico} style={{width:16,textAlign:"center"}} aria-hidden="true"></i>{it.label}
                {it.badge>0 && <span className="tbadge" style={{background:it.color,color:it.color==="var(--accent)"?"var(--ink)":"#fff"}}>{it.badge}</span>}
              </button>
            );
          })}
        </nav>
        {isSuper && orgs.length>1 && (
          <Dropdown width={200} align="right" value={orgId}
                    options={orgs.map(o=>({value:o.id,label:o.name,sub:"plan "+(o.plan||"standard")}))}
                    onChange={id=>{setOrgId(id);setView({name:"dashboard"});}}/>
        )}
        <span style={{color:"#AEB2B9",font:"600 12px system-ui",marginLeft:10,whiteSpace:"nowrap"}}>{profile.full_name}</span>
        <button className="btn ghost sm" style={{marginLeft:8,color:"#C9CCD1",borderColor:"#444"}} onClick={()=>sb.auth.signOut()}>Quitter</button>
      </header>

      <main className="main" style={{flex:1,minWidth:0}}>
       <div style={{maxWidth:1180,margin:"0 auto"}}>
        <header style={{marginBottom:20}}>
          <div style={{font:"700 10px system-ui",textTransform:"uppercase",letterSpacing:".12em",color:"var(--muted)",marginBottom:4}}>
            Plan {org?.plan==="connect"?"Connect · machines connectées":"Standard"}
          </div>
          <h1 style={{fontFamily:"var(--display)",fontSize:26,margin:0,textTransform:"uppercase"}}>{org?.name}</h1>
        </header>

        {view.name==="dashboard" && <Dashboard machines={machines} interventions={interventions} preventifs={preventifs} parts={parts} org={org} kpi={kpi} machineName={machineName} db={db} setView={setView}/>}
        {view.name==="parc" && <Parc machines={machines} interventions={interventions} preventifs={preventifs} setModal={setModal} setView={setView} isSuper={isSuper}/>}
        {view.name==="machine" && <MachineDetail machine={machines.find(m=>m.id===view.id)} docs={docs.filter(d=>d.machine_id===view.id)} interventions={interventions.filter(i=>i.machine_id===view.id)} parts={parts} plans={preventifs.filter(p=>p.machine_id===view.id)} db={db} back={()=>setView({name:"parc"})}/>}
        {view.name==="triage" && <Triage interventions={interventions} machineName={machineName} db={db}/>}
        {view.name==="interventions" && <Interventions interventions={interventions} machineName={machineName} db={db} parts={parts} setModal={setModal} setView={setView}/>}
        {view.name==="preventif" && <Preventif preventifs={preventifs} interventions={interventions} machines={machines} machineName={machineName} db={db} setModal={setModal}/>}
        {view.name==="pieces" && <Pieces parts={parts} setModal={setModal} db={db}/>}
        {view.name==="analyse" && <Analyse machines={machines} interventions={interventions} org={org} db={db} role={profile.role}/>}
        {view.name==="admin" && isSuper && <>
          <PendingRequests pending={pendingProfiles} orgs={orgs} db={db}/>
          <Toolbar><H2>Clients &amp; usines ({orgs.length})</H2><button className="btn" onClick={()=>setModal("org")}>+ Nouveau client</button></Toolbar>
          {orgs.map(o=>(

      {modal==="org" && <OrgModal onClose={()=>setModal(null)} onSave={db.addOrg}/>}
      {modal==="preventif" && <PreventifModal machines={machines} onClose={()=>setModal(null)} onSave={db.addPreventif}/>}
      {modal==="part" && <PartModal onClose={()=>setModal(null)} onSave={db.addPart}/>}
      {modal==="import" && <ImportModal onClose={()=>setModal(null)} onImport={db.importMachines}/>}

      {/* Barre d'onglets du bas (mobile) */}
      <nav className="bottomnav">
        {PRIMARY.map(k=>{
          const it = ITEM[k];
          return (
            <button key={k} className={"btab"+(view.name===k?" active":"")} onClick={()=>setView({name:k})}>
              {it.badge>0 && <span className="bdot"/>}
              <i className={"bico fa-solid "+it.ico} aria-hidden="true"></i>{it.label}
            </button>
          );
        })}
        <button className={"btab"+(SECONDARY.includes(view.name)||navOpen?" active":"")} onClick={()=>setNavOpen(true)}>
          {SECONDARY.some(k=>ITEM[k].badge>0) && <span className="bdot"/>}
          <i className="bico fa-solid fa-ellipsis" aria-hidden="true"></i>Plus
        </button>
      </nav>

      {/* Feuille "Plus" (mobile) */}
      {navOpen && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:90}} onClick={()=>setNavOpen(false)}>
          <div style={{position:"absolute",bottom:0,left:0,right:0,background:"#fff",padding:"16px 16px 22px"}} onClick={e=>e.stopPropagation()}>
            <div style={{font:"800 13px system-ui",textTransform:"uppercase",letterSpacing:".08em",color:"var(--muted)",marginBottom:12}}>Plus</div>
            {SECONDARY.map(k=>{
              const it = ITEM[k];
              return (
                <button key={k} style={{display:"flex",alignItems:"center",gap:12,width:"100%",background:view.name===k?"var(--bg)":"transparent",border:0,padding:"13px 10px",font:"700 14px system-ui",color:"var(--ink)",cursor:"pointer",textAlign:"left"}}
                        onClick={()=>{setView({name:k});setNavOpen(false);}}>
                  <i className={"fa-solid "+it.ico} style={{fontSize:18,width:22,textAlign:"center"}} aria-hidden="true"></i>{it.label}
                  {it.badge>0 && <span className="navbadge" style={{background:it.color||"var(--alarm)",color:it.color==="var(--accent)"?"var(--ink)":"#fff"}}>{it.badge}</span>}
                </button>
              );
            })}
            <div style={{borderTop:"1px solid #E3E5E8",margin:"12px 0 0",paddingTop:12,font:"500 12px system-ui",color:"var(--muted)"}}>
              {profile.full_name} · {ROLES[profile.role]?.label || profile.role}
            </div>
            <button className="btn" style={{width:"100%",marginTop:10}} onClick={()=>sb.auth.signOut()}>Déconnexion</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ------------------------- VUES ------------------------- */
function WeeklyBrief({org,machines,interventions,preventifs,machineName,db}) {
  const wk = isoWeek();
  const cached = org?.settings?.weekly_brief;
  const [busy,setBusy] = useState(false);
  const [err,setErr] = useState(null);
  const text = cached?.week===wk ? cached.text : null;
  const buildStats = () => {
    const d7 = new Date(Date.now()-7*864e5).toISOString();
    const lastWeek = interventions.filter(i=>i.type==="curative" && i.reported_at>d7);
    const byM = {}; lastWeek.forEach(i=>{byM[i.machine_id]=(byM[i.machine_id]||0)+1;});
    const topM = Object.entries(byM).sort((a,b)=>b[1]-a[1])[0];
    const byC = {}; lastWeek.forEach(i=>{
      if (!i.failure_cause) return;
      const lbl = FAILCAUSE[i.failure_cause]?.label || i.failure_cause;
      byC[lbl] = (byC[lbl]||0)+1;
    });
    return {
      pannes_7_derniers_jours: lastWeek.length,
      machine_la_plus_touchee: topM ? `${machineName(topM[0])} (${topM[1]} pannes)` : null,
      causes: byC,
      interventions_encore_ouvertes: interventions.filter(i=>i.status!=="done" && i.triage!=="pending").length,
      preventifs_en_retard: preventifs.filter(p=>p.active && (p.next_due<=today() || planHoursDue(p,machines))).length,
      preventifs_dus_sous_7_jours: preventifs.filter(p=>p.active && p.next_due>today() && p.next_due<=addDays(today(),7)).length,
      machines_en_mode_degrade: machines.filter(m=>m.status==="degraded").map(m=>m.name),
    };
  };
  const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const printReport = () => {
    const s = buildStats();
    const rows = [
      ["Pannes (7 derniers jours)", s.pannes_7_derniers_jours],
      ["Machine la plus touchée", s.machine_la_plus_touchee || "—"],
      ["Causes identifiées", Object.entries(s.causes).map(([k,n])=>`${k} ×${n}`).join(", ") || "—"],

      ["Préventifs à venir (7 j)", s.preventifs_dus_sous_7_jours],
      ["Machines en mode dégradé", s.machines_en_mode_degrade.join(", ") || "aucune"],
    ];
    const w = window.open("","_blank","width=820,height=980");
    w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>Rapport hebdo ${wk} — ${esc(org?.name||"")}</title></head>
<body style="font-family:system-ui,sans-serif;color:#1B1D21;margin:0;padding:40px 46px">
  <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:5px solid #FFC400;padding-bottom:16px">
    <div>
      <div style="font-family:'Arial Black',sans-serif;font-size:24px;text-transform:uppercase">${esc(org?.name||"")}</div>
      <div style="font-size:11px;color:#8A8F98;font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-top:4px">Rapport hebdomadaire maintenance · Semaine ${wk}</div>
    </div>
    ${org?.logo_url ? `<img src="${esc(org.logo_url)}" style="height:56px;max-width:180px;object-fit:contain"/>` : `<div style="font-family:'Arial Black',sans-serif;font-size:16px"><span style="color:#FFC400">▮▮</span> MAINT<span style="color:#FFC400">X</span></div>`}
  </div>
  <h2 style="font-family:'Arial Black',sans-serif;font-size:14px;text-transform:uppercase;letter-spacing:.05em;margin:28px 0 10px">Synthèse</h2>
  <p style="font-size:14px;line-height:1.6;margin:0;white-space:pre-wrap">${esc(text||"")}</p>
  <h2 style="font-family:'Arial Black',sans-serif;font-size:14px;text-transform:uppercase;letter-spacing:.05em;margin:30px 0 10px">Chiffres de la semaine</h2>
  <table style="width:100%;border-collapse:collapse;font-size:13px">
    ${rows.map(([k,v])=>`<tr><td style="padding:9px 4px;border-bottom:1px solid #E3E5E8;font-weight:700;width:46%">${esc(k)}</td><td style="padding:9px 4px;border-bottom:1px solid #E3E5E8">${esc(v)}</td></tr>`).join("")}
  </table>
  <div style="margin-top:44px;font-size:10px;color:#8A8F98">Généré par MaintX le ${new Date().toLocaleDateString("fr-FR")} · document interne maintenance</div>
</body></html>`);
    w.document.close(); w.focus(); setTimeout(()=>w.print(), 400);
  };
  const gen = async () => {
    setBusy(true); setErr(null);
    try {
      const stats = buildStats();
      const res = await fetch(FN.brief, {
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+SUPABASE_KEY,"apikey":SUPABASE_KEY},
        body:JSON.stringify({stats, org:org?.name}),
      });
      const p = await res.json();
      if (!res.ok || p.error) throw new Error(p.error||res.status);
      await db.saveWeeklyBrief(wk, p.text);
    } catch(e) { setErr("Brief momentanément indisponible, réessayez dans un instant. ("+(e.message||e)+")"); }
    setBusy(false);
  };
  return (
    <div style={{background:"#fff",borderLeft:"4px solid var(--accent)",padding:"12px 16px",marginBottom:16,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>

        <div style={{font:"700 10px system-ui",textTransform:"uppercase",letterSpacing:".1em",color:"var(--muted)"}}>Brief de la semaine · {wk}</div>

      </div>
      {text && <button className="btn sm" onClick={printReport}><i className="fa-solid fa-print" aria-hidden="true"></i> PDF</button>}
      <button className="btn ghost sm" disabled={busy} onClick={gen}>{busy?"Génération…":text?"↻ Régénérer":"Générer"}</button>
    </div>
  );
}

function ChronicAlert({chroniques}) {
  const [,force] = useState(0);
  // masquable ; réapparaît si le nombre de pannes augmente (nouvelle clé)
  const visible = chroniques.filter(c=>localStorage.getItem(`mx_chronic_${c.mid}_${c.n}`)!=="1");
  if (!visible.length) return null;
  const dismiss = () => { visible.forEach(c=>localStorage.setItem(`mx_chronic_${c.mid}_${c.n}`,"1")); force(x=>x+1); };
  return (
    <div style={{background:"#FDECEA",border:"1px solid var(--alarm)",color:"var(--alarm)",padding:"12px 16px",margin:"16px 0",font:"600 13px system-ui",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
      <span style={{flex:1}}><i className="fa-solid fa-triangle-exclamation" aria-hidden="true"></i> Panne récurrente : {visible.map(c=>`${c.m?.name} (${c.n} curatifs / 90 j)`).join(", ")}</span>
      <button className="btn ghost sm" style={{borderColor:"var(--alarm)",color:"var(--alarm)"}} onClick={dismiss}>Masquer</button>
    </div>
  );
}

function Dashboard({machines,interventions,preventifs,parts,org,kpi,machineName,db,setView}) {
  const degOver = machines.filter(m=>m.status==="degraded" && m.degraded_deadline && m.degraded_deadline<today());
  const cnt = {running:0,degraded:0,alarm:0};
  machines.forEach(m=>{ if(m.status==="running")cnt.running++; else if(m.status==="degraded")cnt.degraded++; else if(m.status==="alarm")cnt.alarm++; });
  const recent = interventions.filter(i=>i.triage!=="pending").slice(0,8);
  return <>
    {kpi.pending>0 && (
      <div style={{background:"var(--accent)",padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",cursor:"pointer"}} onClick={()=>setView({name:"interventions"})}>
        <i className="fa-solid fa-bell" style={{fontSize:18}} aria-hidden="true"></i>
        <span style={{flex:1,font:"700 14px system-ui",color:"var(--ink)"}}>
          {kpi.pending} nouvelle{kpi.pending>1?"s":""} demande{kpi.pending>1?"s":""} d'intervention à valider
        </span>
        <span className="btn sm">Voir →</span>
      </div>
    )}
    <WeeklyBrief org={org} machines={machines} interventions={interventions} preventifs={preventifs} machineName={machineName} db={db}/>
    <div style={{background:"var(--panel)",borderBottom:"3px solid var(--accent)",marginBottom:20,padding:"10px 16px 12px"}}>
      <div style={{display:"flex",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:8}}>
        <span style={{font:"700 10px system-ui",textTransform:"uppercase",letterSpacing:".08em",color:"var(--muted)",flex:1}}>État du parc</span>
        {machines.length>0 && (
          <span style={{font:"600 11px system-ui",color:"var(--muted)"}}>
            {cnt.running} en marche{cnt.degraded>0?` · ${cnt.degraded} dégradé${cnt.degraded>1?"es":"e"}`:""}{cnt.alarm>0?` · `:""}
            {cnt.alarm>0 && <span style={{color:"var(--alarm)",fontWeight:700}}>{cnt.alarm} en panne</span>}
          </span>
        )}
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {machines.length===0 && <span style={{font:"500 13px system-ui",color:"var(--muted)"}}>Aucune machine — ajoutez votre parc dans « Machines ».</span>}
        {machines.map(m=>(
          <div key={m.id} className="andon" title={`${m.name} — ${STATUS[m.status].label}`} onClick={()=>setView({name:"machine",id:m.id})}>
            <span className={"lamp"+(m.status==="alarm"?" blink":"")} style={{background:STATUS[m.status].color}}/>
            <span className="andon-code">{m.code||"—"}</span>
          </div>
        ))}
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12}}>
      <Kpi label="Machines en panne" value={kpi.pannes} alert={kpi.pannes>0} color="var(--alarm)"/>
      <Kpi label="Interventions ouvertes" value={kpi.ouvertes}/>
      <Kpi label="MTTR moyen" value={kpi.mttr?kpi.mttr+" min":"—"}/>
      <Kpi label="Préventifs en retard" value={kpi.retard} alert={kpi.retard>0} color="var(--warn)"/>
      <Kpi label="Pièces en stock bas" value={kpi.lowStock} alert={kpi.lowStock>0} color="var(--warn)"/>
    </div>
    {degOver.length>0 && (
      <div style={{background:"#FDECEA",border:"1px solid var(--alarm)",color:"var(--alarm)",padding:"12px 16px",margin:"16px 0 0",font:"600 13px system-ui",cursor:"pointer"}}
           onClick={()=>setView({name:"machine",id:degOver[0].id})}>
        <i className="fa-solid fa-clock" aria-hidden="true"></i> Mode dégradé dépassé : {degOver.map(m=>`${m.name} (à réparer avant le ${m.degraded_deadline})`).join(", ")} — planifiez la réparation.
      </div>
    )}
    <ChronicAlert chroniques={kpi.chroniques}/>
    <H2>Dernières interventions</H2>
    <IntTable rows={recent} machineName={machineName} db={db} parts={parts}/>

  </>;
}

function Parc({machines,interventions,preventifs,setModal,setView,isSuper}) {
  return <>
    <Toolbar>
      <H2>Parc machines ({machines.length})</H2>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {machines.length>0 && <button className="btn ghost" onClick={()=>printAllQR(machines)}><i className="fa-solid fa-print" aria-hidden="true"></i> Étiquettes QR (A4)</button>}
        {isSuper && <button className="btn ghost" onClick={()=>setModal("import")}>⤒ Importer CSV</button>}
        <button className="btn" onClick={()=>setModal("machine")}>+ Ajouter</button>
      </div>
    </Toolbar>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
      {machines.map(m=>{
        const h = computeHealth(m, interventions.filter(i=>i.machine_id===m.id), preventifs.filter(p=>p.machine_id===m.id));
        const days = m.degraded_deadline ? Math.ceil((new Date(m.degraded_deadline)-Date.now())/864e5) : null;
        const hint = m.status==="alarm" ? "En panne maintenant"
          : m.status==="degraded" ? (days!=null ? (days<0?`Dégradé · dépassé ${-days} j`:`Dégradé · J−${days}`) : "Dégradé autorisé")
          : m.status==="maintenance" ? "En maintenance"
          : m.status==="stopped" ? "Arrêtée"
          : h.score>=80 ? "RAS" : (h.reasons[0]||"RAS").replace(/\s*\(−?\d+\)/,"");
        return (
        <div key={m.id} style={{background:"var(--panel)",borderTop:`3px solid ${STATUS[m.status].color}`,padding:"12px 14px",cursor:"pointer",display:"flex",flexDirection:"column"}}
             title="Ouvrir la fiche" onClick={()=>setView({name:"machine",id:m.id})}>
          <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{font:"700 10px ui-monospace,monospace",color:"var(--muted)",textTransform:"uppercase",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.code||"—"}{m.family?" · "+m.family:""}</div>
              <div style={{fontWeight:800,fontSize:14,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.name}</div>
            </div>
            <span className={"lamp lg"+(m.status==="alarm"?" blink":"")} style={{background:STATUS[m.status].color,flex:"none"}}/>
          </div>
          <div style={{display:"flex",alignItems:"baseline",gap:6,marginTop:10}}>
            <span style={{font:"800 22px system-ui",color:h.color}}>{h.score}</span>
            <span style={{font:"500 11px system-ui",color:"var(--muted)"}}>forme /100</span>
            <span style={{marginLeft:"auto",font:"600 11px system-ui",color:CRIT[m.criticality]?.color}} title={CRIT[m.criticality]?.label}>{"▮".repeat(m.criticality)}{"▯".repeat(3-m.criticality)}</span>
          </div>
          <div style={{font:"500 11px system-ui",color:m.status==="alarm"||(m.status==="degraded"&&days<0)?"var(--alarm)":"var(--muted)",marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{hint}</div>
        </div>
      );})}
    </div>
    {machines.length===0 && <Empty>Ajoutez votre première machine avec le bouton ci-dessus.</Empty>}
  </>;
}
