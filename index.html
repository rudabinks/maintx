function MachineDetail({machine,docs,interventions,parts,plans,db,back}) {
  const [tab,setTab] = useState("infos");
  const [degModal,setDegModal] = useState(false);
  if (!machine) return null;
  return <>
    <button className="btn ghost sm" onClick={back}>← Retour au parc</button>
    <div style={{display:"flex",alignItems:"center",gap:16,margin:"16px 0 4px"}}>
      <span className={"lamp lg"+(machine.status==="alarm"?" blink":"")} style={{background:STATUS[machine.status].color}}/>
      <div>
        <div style={{font:"700 11px ui-monospace,monospace",color:"var(--muted)",textTransform:"uppercase"}}>{machine.code} · {machine.family}</div>
        <h2 style={{fontFamily:"var(--display)",fontSize:22,margin:0,textTransform:"uppercase"}}>{machine.name}</h2>
      </div>
      <Dropdown width={195} align="right" style={{marginLeft:"auto"}} value={machine.status}
                options={Object.entries(STATUS).map(([k,v])=>({value:k,label:v.label,color:v.color}))}
                onChange={st=>st==="degraded" ? setDegModal(true) : db.setMachineStatus(machine.id,st)}/>
    </div>
    {machine.status==="degraded" && <DegradedBanner machine={machine} onEdit={()=>setDegModal(true)}/>}
    {degModal && <DegradedModal machine={machine} onClose={()=>setDegModal(false)}
                                onSave={(cond,dl)=>{db.setDegraded(machine.id,cond,dl);setDegModal(false);}}/>}
    <div style={{borderBottom:"1.5px solid #D5D8DC",marginBottom:16}}>
      {[["infos","Infos & specs"],["activite","Activité"],["docs",`Documents (${docs.length})`],["histo",`Historique (${interventions.length})`],["qr","QR code"]].map(([k,l])=>(
        <button key={k} className={"tab"+(tab===k?" active":"")} onClick={()=>setTab(k)}>{l}</button>
      ))}
    </div>
    {tab==="infos" && <><MeterBox machine={machine} db={db}/><Specs machine={machine} db={db}/></>}
    {tab==="activite" && <ActivityTab machine={machine} interventions={interventions} docs={docs} plans={plans||[]} db={db}/>}
    {tab==="docs" && <Docs machine={machine} docs={docs} db={db}/>}
    {tab==="histo" && <>
      {interventions.map(i=><IRow key={i.id} i={i} machineName={()=>""} db={db} full parts={parts}/>)}
      {interventions.length===0 && <Empty>Aucune intervention sur cette machine.</Empty>}
    </>}
    {tab==="qr" && <QRTab machine={machine}/>}
  </>;
}

function DegradedBanner({machine,onEdit}) {
  const days = machine.degraded_deadline ? Math.ceil((new Date(machine.degraded_deadline)-Date.now())/864e5) : null;
  const over = days !== null && days < 0;
  return (
    <div style={{background:over?"#FDECEA":"#FFF7DB",border:`1.5px solid ${over?"var(--alarm)":"var(--accent)"}`,padding:"12px 16px",margin:"12px 0",display:"flex",gap:14,alignItems:"center",flexWrap:"wrap"}}>
      <div style={{flex:1,minWidth:220}}>
        <div style={{font:"800 12px system-ui",textTransform:"uppercase",letterSpacing:".05em",color:over?"var(--alarm)":"var(--ink)"}}>
          <i className="fa-solid fa-triangle-exclamation" aria-hidden="true"></i> Mode dégradé autorisé {over ? "— DATE LIMITE DÉPASSÉE" : ""}
        </div>
        <div style={{font:"500 13px system-ui",marginTop:4}}>{machine.degraded_conditions}</div>
      </div>
      <div style={{textAlign:"center"}}>
        <div style={{fontFamily:"var(--display)",fontSize:24,lineHeight:1,color:over?"var(--alarm)":"var(--ink)"}}>
          {days===null ? "—" : over ? `+${-days} j` : `J−${days}`}
        </div>
        <div style={{font:"600 10px system-ui",textTransform:"uppercase",color:"var(--muted)"}}>
          {over ? "de retard" : "avant réparation"}
        </div>
        <div style={{font:"600 11px system-ui",color:"var(--muted)"}}>{machine.degraded_deadline}</div>
      </div>
      <button className="btn ghost sm" onClick={onEdit}>Modifier</button>
      <div style={{width:"100%",font:"500 11px system-ui",color:"var(--muted)"}}>
        Pour sortir du mode dégradé : changez le statut de la machine (menu en haut à droite).
      </div>
    </div>
  );
}

function DegradedModal({machine,onClose,onSave}) {
  const [cond,setCond] = useState(machine.degraded_conditions || "");
  const [dl,setDl] = useState(machine.degraded_deadline || addDays(today(),7));
  return (
    <Modal title="Mode dégradé autorisé" onClose={onClose}>
      <div style={{font:"500 12px system-ui",color:"var(--muted)",marginBottom:12}}>
        La machine continue de tourner sous conditions, avec une date limite de réparation.
        L'écart est assumé et tracé (principe repris de l'aéronautique).
      </div>
      <label style={{font:"500 12px system-ui",color:"var(--muted)"}}>Conditions d'exploitation (obligatoire)</label>
      <textarea rows={3} placeholder="Ex : vitesse réduite 50 %, pas d'usinage inox, contrôle visuel toutes les 2 h"
                value={cond} onChange={e=>setCond(e.target.value)} style={{marginBottom:10}}/>
      <label style={{font:"500 12px system-ui",color:"var(--muted)"}}>Réparer avant le</label>
      <input type="date" value={dl} onChange={e=>setDl(e.target.value)} style={{marginBottom:12}}/>
      <div style={{display:"flex",gap:8}}>
        <button className="btn ghost" onClick={onClose} style={{flex:1}}>Annuler</button>
        <button className="btn" disabled={!cond.trim()||!dl} onClick={()=>onSave(cond.trim(),dl)} style={{flex:2}}>
          Activer le mode dégradé
        </button>
      </div>
    </Modal>
  );
}

function MeterBox({machine,db}) {
  const [h,setH] = useState(machine.meter_hours ?? 0);
  useEffect(() => { setH(machine.meter_hours ?? 0); }, [machine.id, machine.meter_hours]);
  return (
    <div className="card" style={{maxWidth:560,marginBottom:12,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
      <b style={{font:"700 12px system-ui",textTransform:"uppercase"}}>Compteur horaire :</b>
      <input type="number" min="0" value={h} onChange={e=>setH(e.target.value)} style={{width:110}}/>
      <span style={{font:"600 13px system-ui"}}>h</span>
      <button className="btn sm" disabled={+h===+(machine.meter_hours??0)} onClick={()=>db.setMeterHours(machine.id,+h||0)}>Enregistrer</button>
      <span style={{font:"500 11px system-ui",color:"var(--muted)"}}>Relevé manuel — déclenchera les gammes « au compteur ». Automatique avec le futur plan Connect.</span>
    </div>
  );
}

function Specs({machine,db}) {
  const specs = machine.meta?.specs || {};
  const [k,setK] = useState(""); const [v,setV] = useState("");
  const save = obj => db.updateMachineMeta(machine.id, {...machine.meta, specs:obj});
  return (
    <div className="card" style={{maxWidth:560}}>
      <div style={{font:"600 12px system-ui",color:"var(--muted)",marginBottom:12}}>
        Caractéristiques techniques de la machine — adaptez librement selon sa technologie
        (tension, pression pneumatique, type de CN, puissance, n° série…).
      </div>
      {Object.entries(specs).map(([key,val])=>(
        <div key={key} style={{display:"flex",gap:8,alignItems:"center",padding:"6px 0",borderBottom:"1px solid #EEE"}}>
          <b style={{width:180,font:"600 13px system-ui"}}>{key}</b>
          <span style={{flex:1,font:"500 13px system-ui"}}>{val}</span>
          <button className="btn ghost sm" onClick={()=>{const s={...specs};delete s[key];save(s);}}>✕</button>
        </div>
      ))}
      {Object.keys(specs).length===0 && <Empty>Aucune caractéristique renseignée.</Empty>}
      <div style={{display:"flex",gap:8,marginTop:12}}>
        <input placeholder="Caractéristique (ex: Tension)" value={k} onChange={e=>setK(e.target.value)}/>
        <input placeholder="Valeur (ex: 3×400V)" value={v} onChange={e=>setV(e.target.value)}/>
        <button className="btn sm" disabled={!k||!v} onClick={()=>{save({...specs,[k]:v});setK("");setV("");}}>+</button>
      </div>
    </div>
  );
}

function Docs({machine,docs,db}) {
  const [cat,setCat] = useState("maintenance");
  const [linkUrl,setLinkUrl] = useState("");
  const [linkName,setLinkName] = useState("");
  const fileRef = useRef();
  const addLink = () => {
    if (!linkUrl.trim().startsWith("http")) { alert("Collez un lien complet (https://…)"); return; }
    db.addDocLink(machine.id, linkUrl.trim(), linkName.trim()||"Document en ligne", cat);
    setLinkUrl(""); setLinkName("");
  };
  return <>
    <div className="card" style={{display:"flex",gap:10,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
      <b style={{font:"700 12px system-ui",textTransform:"uppercase"}}>Ajouter un document :</b>
      <Dropdown width={175} value={cat}
                options={Object.entries(DOCCAT).map(([k,v])=>({value:k,label:v.label,color:v.color}))}
                onChange={setCat}/>
      <input type="file" multiple ref={fileRef} style={{width:"auto",border:0,padding:0}}
             onChange={async e=>{
               const fs = [...e.target.files]; e.target.value = "";
               for (const f of fs) await db.uploadDoc(machine.id, f, cat);
             }}/>
      <span style={{font:"500 11px system-ui",color:"var(--muted)"}}>Fichier stocké dans MaintX (max 50 Mo, compressez les gros PDF)</span>
    </div>
    <div className="card" style={{display:"flex",gap:10,alignItems:"center",marginBottom:14,flexWrap:"wrap"}}>
      <b style={{font:"700 12px system-ui",textTransform:"uppercase"}}>Ou par lien :</b>
      <input placeholder="https://drive.google.com/… (Drive, Dropbox, site constructeur)" value={linkUrl}
             onChange={e=>setLinkUrl(e.target.value)} style={{flex:"1 1 240px",width:"auto"}}/>
      <input placeholder="Nom (ex: Catalogue pièces 2024)" value={linkName}
             onChange={e=>setLinkName(e.target.value)} style={{flex:"1 1 160px",width:"auto"}}/>
      <button className="btn sm" disabled={!linkUrl.trim()} onClick={addLink}>Ajouter</button>
      <span style={{font:"500 11px system-ui",color:"var(--muted)"}}>Ne compte pas dans le stockage MaintX.</span>
    </div>
    {Object.entries(DOCCAT).map(([k,v])=>{
      const list = docs.filter(d=>d.category===k);
      if (!list.length) return null;
      return (
        <div key={k} style={{marginBottom:12}}>
          <span className="doccat" style={{background:v.color}}>{v.label}</span>
          {list.map(d=>(
            <Row key={d.id}>
              <div style={{flex:1,cursor:"pointer"}} onClick={()=>db.openDoc(d)}>
                <b style={{font:"600 13px system-ui"}}><i className="fa-regular fa-file" aria-hidden="true"></i> {d.name}</b>
                <div style={{font:"500 11px system-ui",color:"var(--muted)"}}>{d.created_at?.slice(0,10)}</div>
              </div>
              <Dropdown width={150} align="right" value={d.category}
                        options={Object.entries(DOCCAT).map(([k,v])=>({value:k,label:v.label,color:v.color}))}
                        onChange={cat=>db.setDocCategory(d,cat)}/>
              {d.storage_path?.startsWith("http") && <span title="Document externe (lien)" style={{font:"600 11px system-ui",color:"var(--muted)"}}><i className="fa-solid fa-link" aria-hidden="true"></i></span>}
              <button className="btn ghost sm" onClick={()=>db.openDoc(d)}>Ouvrir</button>
              <button className="btn ghost sm" onClick={()=>db.deleteDoc(d)}>✕</button>
            </Row>
          ))}
        </div>
      );
    })}
    {docs.length===0 && <Empty>Aucun document. Ajoutez schémas électriques, pneumatiques, hydrauliques, notices de maintenance…</Empty>}
  </>;
}

function Mecano({machine,docs,db}) {
  const [q,setQ] = useState("");
  const [hist,setHist] = useState([]);
  const [busy,setBusy] = useState(false);
  const nbIndexed = docs.filter(d=>d.indexed_at).length;
  const ask = async () => {
    const question = q.trim();
    if (!question || busy) return;
    setBusy(true); setQ("");
    try {
      const r = await db.askMecano(machine, question);
      setHist(h=>[{q:question, a:r.answer, sources:r.sources||[]}, ...h]);
    } catch(e) {
      setHist(h=>[{q:question, a:"Service momentanément indisponible, réessayez. ("+(e.message||e)+")", sources:[]}, ...h]);
    }
    setBusy(false);
  };
  return <>
    <div className="card" style={{maxWidth:640,marginBottom:14}}>
      <div style={{font:"700 12px system-ui",textTransform:"uppercase",letterSpacing:".05em",marginBottom:6}}>🔧 Mécano — l'assistant qui a lu les manuels</div>
      <div style={{font:"500 12px system-ui",color:"var(--muted)",marginBottom:12}}>
        Répond uniquement à partir des documents indexés de cette machine ({nbIndexed} document{nbIndexed>1?"s":""} lisible{nbIndexed>1?"s":""} 🧠),
        avec la page en source. S'il ne trouve pas, il le dit — il n'invente jamais.
      </div>
      <div style={{display:"flex",gap:8}}>
        <input placeholder="Ex : couple de serrage de la broche ? pression pneumatique ?" value={q}
               onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&ask()}/>
        <button className="btn" disabled={busy||!q.trim()} onClick={ask}>{busy?"…":"Demander"}</button>
      </div>
      {nbIndexed===0 && <div style={{font:"600 12px system-ui",color:"var(--warn)",marginTop:8}}>
        Aucun document indexé — uploadez un PDF dans l'onglet Documents (indexation automatique) ou cliquez 🧠 Indexer sur les PDF existants.
      </div>}
    </div>
    {hist.map((h,k)=>(
      <div key={k} className="card" style={{maxWidth:640,marginBottom:10}}>
        <div style={{font:"700 13px system-ui",marginBottom:6}}>❓ {h.q}</div>
        <div style={{font:"500 13px system-ui",whiteSpace:"pre-wrap"}}>{h.a}</div>
        {h.sources.length>0 && (
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
            {h.sources.map((s,j)=>(
              <span key={j} style={{font:"600 11px system-ui",background:"var(--bg)",padding:"3px 8px"}}><i className="fa-regular fa-file" aria-hidden="true"></i> {s.doc} · p. {s.page}</span>
            ))}
          </div>
        )}
      </div>
    ))}
  </>;
}

function Heatmap({interventions}) {
  const counts = {};
  interventions.filter(i=>i.type==="curative").forEach(i=>{
    const d = i.reported_at?.slice(0,10);
    if (d) counts[d] = (counts[d]||0)+1;
  });
  const start = new Date(); start.setDate(start.getDate()-364);
  const days = [...Array(365)].map((_,k)=>{const d=new Date(start); d.setDate(d.getDate()+k); return d.toISOString().slice(0,10);});
  const color = n => !n ? "#E3E5E8" : n===1 ? "#F0B4AD" : n===2 ? "#E07A6E" : "var(--alarm)";
  return (
    <div className="card" style={{maxWidth:800,overflowX:"auto"}}>
      <div style={{display:"grid",gridTemplateRows:"repeat(7,10px)",gridAutoFlow:"column",gap:2,width:"max-content"}}>
        {days.map(d=><div key={d} title={d+(counts[d]?` — ${counts[d]} panne${counts[d]>1?"s":""}`:"")} style={{width:10,height:10,background:color(counts[d])}}/>)}
      </div>
      <div style={{font:"500 11px system-ui",color:"var(--muted)",marginTop:8,display:"flex",gap:10,alignItems:"center"}}>
        <span>Il y a 12 mois</span>
        <span style={{marginLeft:"auto"}}>Pannes/jour :</span>
        {[0,1,2,3].map(n=><span key={n} style={{display:"inline-flex",alignItems:"center",gap:3}}><span style={{width:10,height:10,background:color(n),display:"inline-block"}}/>{n===3?"3+":n}</span>)}
      </div>
    </div>
  );
}

function ActivityTab({machine,interventions,docs,plans,db}) {
  const {score,reasons,color} = computeHealth(machine,interventions,plans);
  const [comments,setComments] = useState([]);
  useEffect(() => { db.fetchMachineComments(interventions.map(i=>i.id)).then(setComments); }, [machine.id]);
  const events = [];
  interventions.forEach(i=>{
    events.push({at:i.reported_at, icon:i.type==="curative"?"fa-circle-exclamation":"fa-screwdriver-wrench", label:`${ITYPE[i.type]} : ${i.title}`});
    if (i.finished_at) events.push({at:i.finished_at, icon:"fa-circle-check", label:`Clôturée : ${i.title}`});
  });
  docs.forEach(d=>events.push({at:d.created_at, icon:"fa-file", label:`Document : ${d.name}`}));
  comments.forEach(c=>events.push({at:c.created_at, icon:"fa-comment", label:`${c.author?.full_name||"?"} : ${c.body}`}));
  events.sort((a,b)=>new Date(b.at)-new Date(a.at));
  return <>
    <div className="card" style={{maxWidth:560,marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",gap:16}}>
        <div style={{fontFamily:"var(--display)",fontSize:40,lineHeight:1,color}}>{score}</div>
        <div style={{flex:1}}>
          <div style={{font:"700 11px system-ui",textTransform:"uppercase",letterSpacing:".07em",color:"var(--muted)"}}>Forme machine / 100</div>
          <div style={{background:"var(--bg)",height:10,marginTop:6}}><div style={{width:score+"%",height:"100%",background:color}}/></div>
        </div>
      </div>
      {reasons.length>0
        ? reasons.map((r,k)=><div key={k} style={{font:"500 12px system-ui",color:"var(--muted)",marginTop:6}}>• {r}</div>)
        : <div style={{font:"600 12px system-ui",color:"var(--run)",marginTop:10}}>Aucun signal négatif — machine en pleine forme.</div>}
      <div style={{font:"500 11px system-ui",color:"var(--muted)",marginTop:10}}>
        Calculé sans capteurs : pannes récentes, préventifs en retard, causes récurrentes, état actuel.
      </div>
    </div>
    <H2>Pannes sur 12 mois</H2>
    <Heatmap interventions={interventions}/>
    <H2>Fil d'activité</H2>
    {events.map((e,k)=>(
      <div key={k} style={{display:"flex",gap:10,padding:"8px 2px",borderBottom:"1px solid #E3E5E8",font:"500 13px system-ui",alignItems:"baseline"}}>
        <i className={"fa-solid "+e.icon} style={{width:16,textAlign:"center",color:"var(--muted)"}} aria-hidden="true"></i>
        <span style={{flex:1}}>{e.label}</span>
        <span style={{color:"var(--muted)",font:"500 12px system-ui",whiteSpace:"nowrap"}}>{e.at?.slice(0,16).replace("T"," ")}</span>
      </div>
    ))}
    {events.length===0 && <Empty>Aucune activité sur cette machine pour l'instant.</Empty>}
  </>;
}

// Génère une planche imprimable avec l'étiquette QR de TOUTES les machines
function printAllQR(machines) {
  if (!machines.length) { alert("Aucune machine à imprimer."); return; }
  const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const base = window.location.origin + window.location.pathname;
  const holder = document.createElement("div");
  holder.style.display = "none";
  document.body.appendChild(holder);
  const cards = machines.map(m => {
    const el = document.createElement("div");
    holder.appendChild(el);
    new QRCode(el, {text: base + "#/qr/" + m.qr_token, width:420, height:420, correctLevel:QRCode.CorrectLevel.M});
    const img = el.querySelector("canvas")?.toDataURL() || el.querySelector("img")?.src || "";
    return {img, code:esc(m.code), name:esc(m.name)};
  });
  document.body.removeChild(holder);
  const w = window.open("","_blank");
  w.document.write(`<html><head><meta charset="utf-8"><title>Étiquettes QR — MaintX</title><style>
    @page{size:A4;margin:0}
    body{font-family:system-ui,sans-serif;margin:0}
    .page{width:210mm;height:297mm;display:flex;flex-direction:column;align-items:center;justify-content:center;box-sizing:border-box;padding:20mm;page-break-after:always;text-align:center}
    .page img{width:120mm;height:120mm}
    .name{font-weight:900;font-size:34px;margin-top:14mm;word-break:break-word;line-height:1.1}
    .code{font-family:ui-monospace,monospace;font-size:20px;color:#444;margin-top:4mm}
    .hint{font-size:15px;color:#666;margin-top:10mm}
    .brand{position:absolute;bottom:12mm;font-size:11px;letter-spacing:.15em;color:#aaa}
  </style></head><body>
    ${cards.map(c=>`<div class="page">
      <img src="${c.img}"/>
      <div class="name">${c.name}</div>
      ${c.code?`<div class="code">${c.code}</div>`:""}
      <div class="hint">Scannez ce QR code pour signaler une panne</div>
      <div class="brand">MAINTX</div>
    </div>`).join("")}
  </body></html>`);
  w.document.close(); w.focus(); setTimeout(()=>w.print(), 500);
}

/* ------------------------- PRÉVENTIF ------------------------- */
const planIsDue = (p,machines) => p.next_due<=today() || planHoursDue(p,machines);

const planDetail = p => `${+p.freq_days>0?`tous les ${p.freq_days} j`:"une seule fois"}${p.freq_hours?` ou ${+p.freq_hours} h`:""}${p.checklist?.length?` · ☑ ${p.checklist.length}`:""}`;

function Preventif({preventifs,interventions,machines,machineName,db,setModal}) {
  const [checkFor,setCheckFor] = useState(null);
  const [groupBy,setGroupBy] = useState("task"); // task | machine
  const [onlyDue,setOnlyDue] = useState(true);    // à faire seulement (défaut) | toutes
  const active = preventifs.filter(p=>p.active!==false);
  const dueCount = active.filter(p=>planIsDue(p,machines)).length;
  const source = onlyDue ? active.filter(p=>planIsDue(p,machines)) : active;
  const history = (interventions||[]).filter(i=>i.type==="preventive" && i.status==="done")
    .sort((a,b)=>new Date(b.finished_at||b.reported_at)-new Date(a.finished_at||a.reported_at)).slice(0,40);
  const groups = {};
  source.forEach(p=>{
    const key = groupBy==="task" ? (p.title||"").trim().toLowerCase() : p.machine_id;
    const label = groupBy==="task" ? p.title : machineName(p.machine_id);
    (groups[key] = groups[key] || {label, plans:[]}).plans.push(p);
  });
  const groupList = Object.values(groups)
    .map(g=>({...g, due:g.plans.filter(p=>planIsDue(p,machines)).length}))
    .sort((a,b)=> b.due-a.due || (a.label||"").localeCompare(b.label||""));
  const segBtn = (val,txt) => (
    <button onClick={()=>setGroupBy(val)} style={{border:0,padding:"8px 12px",cursor:"pointer",font:"700 12px system-ui",
      background:groupBy===val?"var(--ink)":"#fff",color:groupBy===val?"var(--accent)":"var(--ink)"}}>{txt}</button>
  );
  const dueBtn = (val,txt) => (
    <button onClick={()=>setOnlyDue(val)} style={{border:0,padding:"8px 12px",cursor:"pointer",font:"700 12px system-ui",
      background:onlyDue===val?"var(--ink)":"#fff",color:onlyDue===val?"var(--accent)":"var(--ink)"}}>{txt}</button>
  );
  return <>
    <Toolbar>
      <H2>Préventif{onlyDue?` · ${dueCount} à faire`:""}</H2>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <div style={{display:"flex",border:"1.5px solid var(--ink)"}}>{dueBtn(true,"À faire")}{dueBtn(false,"Toutes")}</div>
        <div style={{display:"flex",border:"1.5px solid var(--ink)"}}>{segBtn("task","Par tâche")}{segBtn("machine","Par machine")}</div>
        <button className="btn" onClick={()=>setModal("preventif")}>+ Nouvelle gamme</button>
      </div>
    </Toolbar>
    {groupList.map(g=>(
      <PreventifGroup key={g.label} g={g} groupBy={groupBy} machines={machines} machineName={machineName} db={db} onCheck={setCheckFor}/>
    ))}
    {active.length===0 && <Empty>Aucune gamme préventive — créez la première avec le bouton ci-dessus.</Empty>}
    {active.length>0 && source.length===0 && onlyDue && <Empty>Rien à faire — tout le préventif est à jour ✓</Empty>}
    {history.length>0 && (
      <Foldable title={`Historique des préventifs faits (${history.length})`}>
        {history.map(i=>(
          <Row key={i.id} style={{borderLeft:"4px solid var(--run)"}}>
            <div style={{flex:1}}>
              <b>{i.title}</b>
              <div style={{font:"500 12px system-ui",color:"var(--muted)",marginTop:2}}>{machineName(i.machine_id)}</div>
            </div>
            <div style={{font:"600 12px system-ui",color:"var(--muted)",whiteSpace:"nowrap"}}>{(i.finished_at||i.reported_at)?.slice(0,10)}</div>
          </Row>
        ))}
      </Foldable>
    )}
    {checkFor && <ChecklistModal plan={checkFor} onClose={()=>setCheckFor(null)}
                                 onValidate={steps=>{db.donePreventif(checkFor,steps);setCheckFor(null);}}/>}
  </>;
}

function PlanRow({p,machines,db,onCheck,bold,sub,indent}) {
  const late = planIsDue(p,machines);
  const nbSteps = p.checklist?.length || 0;
  return (
    <Row style={{borderLeft:`4px solid ${late?"var(--alarm)":"var(--run)"}`,...(indent?{marginLeft:12}:{})}}>
      <div style={{flex:1}}>
        <b>{bold||"—"}</b>
        <div style={{font:"500 12px system-ui",color:"var(--muted)",marginTop:2}}>{sub}</div>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontWeight:700,color:late?"var(--alarm)":"var(--ink)"}}>{p.next_due}</div>
        <div style={{font:"500 12px system-ui",color:"var(--muted)"}}>{late?(planHoursDue(p,machines)?"COMPTEUR":"EN RETARD"):"planifié"}</div>
      </div>
      <button className="btn sm" onClick={()=>nbSteps>0 ? onCheck(p) : db.donePreventif(p)}>✓ Fait</button>
    </Row>
  );
}

function PreventifGroup({g,groupBy,machines,machineName,db,onCheck}) {
  const [open,setOpen] = useState(false);
  if (g.plans.length===1) {
    const p = g.plans[0];
    return <PlanRow p={p} machines={machines} db={db} onCheck={onCheck}
                    bold={p.title} sub={`${machineName(p.machine_id)} · ${planDetail(p)}`}/>;
  }
  const unit = groupBy==="task" ? "machines" : "tâches";
  return (
    <div style={{border:`1px solid ${g.due>0?"var(--alarm)":"#E3E5E8"}`,marginBottom:10}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",background:"var(--panel)",flexWrap:"wrap"}}>
        <div style={{flex:1,cursor:"pointer",minWidth:180}} onClick={()=>setOpen(!open)}>
          <b>{open?"▾":"▸"} {g.label}</b>
          <div style={{font:"500 12px system-ui",color:"var(--muted)",marginTop:2}}>
            {g.plans.length} {unit}{g.due>0?` · ${g.due} à faire`:" · à jour"}
          </div>
        </div>
        <button className="btn sm" onClick={()=>db.donePreventifBatch(g.plans)}>✓ Tout valider ({g.plans.length})</button>
      </div>
      {open && g.plans.map(p=>(
        <PlanRow key={p.id} p={p} machines={machines} db={db} onCheck={onCheck} indent
                 bold={groupBy==="task"?machineName(p.machine_id):p.title} sub={planDetail(p)}/>
      ))}
    </div>
  );
}

function ChecklistModal({plan,onClose,onValidate}) {
  const [steps,setSteps] = useState((plan.checklist||[]).map(s=>({step:s.step||s,done:false})));
  const nb = steps.filter(s=>s.done).length;
  return (
    <Modal title={plan.title} onClose={onClose}>
      <div style={{font:"500 12px system-ui",color:"var(--muted)",marginBottom:12}}>
        Cochez les points réalisés. Vous pouvez valider même si tout n'a pas été fait — les points non faits resteront tracés dans l'historique.
      </div>
      {steps.map((s,k)=>(
        <label key={k} style={{display:"flex",gap:10,alignItems:"center",padding:"9px 10px",background:s.done?"rgba(31,162,84,.08)":"var(--bg)",marginBottom:6,cursor:"pointer",font:"600 13px system-ui"}}>
          <input type="checkbox" checked={s.done} style={{width:18,height:18,margin:0}}
                 onChange={()=>setSteps(steps.map((x,j)=>j===k?{...x,done:!x.done}:x))}/>
          <span style={s.done?{textDecoration:"line-through",color:"var(--muted)"}:null}>{s.step}</span>
        </label>
      ))}
      <button className="btn" style={{width:"100%",marginTop:10}} onClick={()=>onValidate(steps)}>
        ✓ Valider ({nb}/{steps.length} faits)
      </button>
    </Modal>
  );
}

function Triage({interventions,machineName,db}) {
  const pending = interventions.filter(i=>i.triage==="pending");
  return <>
    <H2>À trier ({pending.length})</H2>
    <div style={{font:"500 13px system-ui",color:"var(--muted)",marginBottom:14}}>
      Signalements arrivés par QR code. Qualifiez-les avant qu'ils entrent dans le flux — objectif : file vide chaque matin.
    </div>
    {pending.map(i=>{
      const others = interventions.filter(x=>x.id!==i.id && x.machine_id===i.machine_id && x.status!=="done" && x.triage!=="pending");
      return <TriageCard key={i.id} i={i} others={others} machineName={machineName} db={db}/>;
    })}
    {pending.length===0 && <Empty>File vide — tout est trié ✓</Empty>}

}

function TriageCard({i,others,machineName,db}) {

        <button className="btn sm" onClick={()=>db.triage(i,"accepted")}>Prendre en charge</button>

          <Dropdown width={190} placeholder="Doublon de…" value={null}
                    options={others.map(o=>({value:o.id,label:o.title.length>26?o.title.slice(0,26)+"…":o.title,sub:o.reported_at?.slice(0,10)}))}

  const {rows} = useMemo(()=>parseMachinesCSV(text), [text]);
  const loadFile = f => { const r=new FileReader(); r.onload=e=>setText(e.target.result); r.readAsText(f); };
  const doImport = async () => {
    setBusy(true);
    const ok = await onImport(rows);
    setBusy(false);
    if (ok) onClose();
  };
  return (
    <Modal title="Importer le parc (CSV / Excel)" onClose={onClose}>
      <div style={{font:"500 12px system-ui",color:"var(--muted)",marginBottom:10}}>
        Colle les cellules depuis Excel, ou choisis un fichier .csv. Colonnes reconnues :
        <b> Nom, Code, Famille, Criticité, Année</b> (une ligne d'en-tête conseillée).
        La criticité accepte 1/2/3 ou Secondaire/Importante/Critique.
      </div>
      <label className="btn ghost sm" style={{display:"inline-block",cursor:"pointer",marginBottom:8}}>
        <i className="fa-regular fa-file" aria-hidden="true"></i> Choisir un fichier CSV
        <input type="file" accept=".csv,.txt,text/csv" ref={fileRef} style={{display:"none"}}
               onChange={e=>{const f=e.target.files[0]; if(f) loadFile(f); e.target.value="";}}/>
      </label>
      <textarea rows={5} placeholder={"Nom;Code;Famille;Criticité;Année\nMori Seiki M300L;FR-08;Tour CN;Critique;2015\nHaas VF2;FR-09;Fraiseuse;2;2019"}
                value={text} onChange={e=>setText(e.target.value)} style={{marginBottom:10,fontFamily:"ui-monospace,monospace",fontSize:12}}/>
      {rows.length>0 ? (
        <div style={{marginBottom:12}}>
          <div style={{font:"700 12px system-ui",marginBottom:6}}>{rows.length} machine{rows.length>1?"s":""} détectée{rows.length>1?"s":""} :</div>
          <div style={{maxHeight:180,overflow:"auto",border:"1px solid #E3E5E8"}}>
            {rows.slice(0,50).map((r,k)=>(
              <div key={k} style={{display:"flex",gap:8,padding:"5px 8px",borderBottom:"1px solid #EEE",font:"500 12px system-ui"}}>
                <b style={{flex:1}}>{r.name}</b>
                <span style={{color:"var(--muted)"}}>{r.code||"—"}</span>
                <span style={{color:"var(--muted)"}}>{r.family||"—"}</span>
                <span style={{color:CRIT[r.crit]?.color,fontWeight:700}}>{CRIT[r.crit]?.label}</span>
              </div>
            ))}
          </div>
          {rows.length>50 && <div style={{font:"500 11px system-ui",color:"var(--muted)",marginTop:4}}>… et {rows.length-50} autres</div>}
        </div>
      ) : text.trim() && <div style={{font:"600 12px system-ui",color:"var(--warn)",marginBottom:12}}>Aucune ligne exploitable — vérifie qu'il y a au moins une colonne Nom.</div>}
      <button className="btn" disabled={!rows.length||busy} onClick={doImport} style={{width:"100%"}}>
        {busy?"Import…":`Importer ${rows.length||""} machine${rows.length>1?"s":""}`}
      </button>
    </Modal>
  );
}

/* ------------------------- ANALYSE ------------------------- */
function Analyse({machines,interventions,org,db,role}) {
  const doneWithTime = interventions.filter(i=>i.started_at&&i.finished_at);
  const [rate,setRate] = useState(org?.settings?.hourly_rate ?? 45);
  // Coût par machine = pièces consommées + heures d'intervention × taux horaire MO
  const costByMachine = machines.map(m=>{
    const its = interventions.filter(i=>i.machine_id===m.id);
    const partsCost = its.reduce((a,i)=>a+(i.parts_used||[]).reduce((s,u)=>s+(+u.cost||0),0),0);
    const hours = its.filter(i=>i.started_at&&i.finished_at).reduce((a,i)=>a+(new Date(i.finished_at)-new Date(i.started_at))/3600000,0);
    return {label:m.code||m.name.slice(0,10), value:Math.round(partsCost + hours*(+rate||0))};
  }).filter(x=>x.value>0).sort((a,b)=>b.value-a.value).slice(0,8);
  // Temps d'arrêt par machine (min)
  const downtimeByMachine = machines.map(m=>({
    label: m.code||m.name.slice(0,10),
    value: Math.round(doneWithTime.filter(i=>i.machine_id===m.id).reduce((a,i)=>a+(new Date(i.finished_at)-new Date(i.started_at))/60000,0))
  })).filter(x=>x.value>0).sort((a,b)=>b.value-a.value).slice(0,8);
  // Interventions par mois (6 derniers)
  const months = [...Array(6)].map((_,k)=>{
    const d = new Date(); d.setMonth(d.getMonth()-(5-k));
    const key = d.toISOString().slice(0,7);
    return {label:key.slice(5)+"/"+key.slice(2,4), value:interventions.filter(i=>i.reported_at?.slice(0,7)===key).length};
  });
  // Répartition par type
  const byType = Object.entries(ITYPE).map(([k,v])=>({label:v, value:interventions.filter(i=>i.type===k).length})).filter(x=>x.value>0);
  const total = interventions.length;

  // Pareto des causes de panne (curatifs avec cause renseignée)
  const curatives = interventions.filter(i=>i.type==="curative");
  const pareto = Object.entries(FAILCAUSE)
    .map(([k,v])=>({label:v.label, value:curatives.filter(i=>i.failure_cause===k).length}))
    .filter(x=>x.value>0).sort((a,b)=>b.value-a.value);
  const sansCause = curatives.filter(i=>!i.failure_cause).length;

  const [retro,setRetro] = useState(false);
  // Totaux pour le résumé
  const mttrMin = doneWithTime.length ? Math.round(doneWithTime.reduce((a,i)=>a+(new Date(i.finished_at)-new Date(i.started_at))/60000,0)/doneWithTime.length) : null;
  const totalDownMin = Math.round(doneWithTime.reduce((a,i)=>a+(new Date(i.finished_at)-new Date(i.started_at))/60000,0));
  const totalPartsCost = interventions.reduce((a,i)=>a+(i.parts_used||[]).reduce((s,u)=>s+(+u.cost||0),0),0);
  const totalCost = Math.round(totalPartsCost + (totalDownMin/60)*(+rate||0));
  const prevN = interventions.filter(i=>i.type==="preventive").length;
  const prevPct = total ? Math.round(100*prevN/total) : 0;
  return <>
    <Toolbar>
      <H2>Analyse</H2>
      {["manager","superadmin"].includes(role) && <button className="btn" onClick={()=>setRetro(true)}>Rétro {new Date().getFullYear()}</button>}
    </Toolbar>
    {retro && <Retro org={org} machines={machines} interventions={interventions} rate={+rate||0} onClose={()=>setRetro(false)}/>}

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(148px,1fr))",gap:10,marginBottom:8}}>
      <Kpi label="Interventions" value={total}/>
      <Kpi label="Part préventif" value={prevPct+"%"} color="var(--run)" alert={prevPct>=50}/>
      <Kpi label="MTTR moyen" value={mttrMin?mttrMin+" min":"—"}/>
      <Kpi label="Arrêt total" value={totalDownMin?Math.round(totalDownMin/60)+" h":"—"}/>
      <Kpi label="Coût maintenance" value={totalCost.toLocaleString("fr-FR")+" €"}/>
    </div>

    <H2>Causes de panne (les plus fréquentes)</H2>
    <HBarChart data={pareto} color="var(--warn)" empty="Renseignez la cause des pannes (menu « Cause ? » sur les interventions curatives)."/>
    {sansCause>0 && pareto.length>0 && (
      <div style={{font:"500 12px system-ui",color:"var(--muted)",marginTop:6}}>
        {sansCause} panne{sansCause>1?"s":""} sans cause renseignée — non comptée{sansCause>1?"s":""}.
      </div>
    )}

    <H2>Coût de maintenance par machine</H2>
    <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:10}}>
      <span style={{font:"600 12px system-ui",color:"var(--muted)"}}>Taux horaire main d'œuvre</span>
      <input type="number" min="0" value={rate} onChange={e=>setRate(e.target.value)} style={{width:90}}/>
      <span style={{font:"600 13px system-ui"}}>€/h</span>
      <button className="btn sm" disabled={+rate===+(org?.settings?.hourly_rate??45)} onClick={()=>db.saveHourlyRate(rate)}>Enregistrer</button>
    </div>
    <HBarChart data={costByMachine} color="var(--ink)" unit="€" empty="Saisissez les pièces utilisées et clôturez les interventions pour mesurer les coûts."/>

    <H2>Temps d'arrêt par machine</H2>
    <HBarChart data={downtimeByMachine} color="var(--alarm)" unit="min" empty="Passez des interventions En cours → Clôturée pour mesurer les arrêts."/>

    <H2>Interventions par mois</H2>
    <BarChart data={months} color="var(--ink)"/>

    <H2>Curatif vs préventif</H2>
    {total>0 ? (
      <div className="card">
        {byType.map(t=>(
          <div key={t.label} style={{margin:"8px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",font:"600 12px system-ui",marginBottom:3}}>
              <span>{t.label}</span><span>{t.value} ({Math.round(100*t.value/total)}%)</span>
            </div>
            <div style={{background:"var(--bg)",height:14}}>
              <div style={{width:(100*t.value/total)+"%",height:"100%",background:t.label==="Curatif"?"var(--alarm)":t.label==="Préventif"?"var(--run)":"var(--warn)"}}/>
            </div>
          </div>
        ))}
        <div style={{font:"500 11px system-ui",color:"var(--muted)",marginTop:10}}>
          Objectif d'une bonne maintenance : faire monter la part de préventif au-dessus du curatif.
        </div>
      </div>
    ) : <Empty>Pas encore de données.</Empty>}
  </>;
}

function Retro({org,machines,interventions,rate,onClose}) {
  const year = new Date().getFullYear();
  const its = interventions.filter(i=>i.reported_at?.slice(0,4)===String(year));
  const cur = its.filter(i=>i.type==="curative");
  const prev = its.filter(i=>i.type==="preventive");
  const byM = machines.map(m=>({m, n:cur.filter(i=>i.machine_id===m.id).length})).sort((a,b)=>b.n-a.n);
  const done = its.filter(i=>i.started_at&&i.finished_at);
  const downtime = Math.round(done.reduce((a,i)=>a+(new Date(i.finished_at)-new Date(i.started_at))/60000,0));
  const mttr = done.length ? Math.round(downtime/done.length) : 0;
  const partsCost = its.reduce((a,i)=>a+(i.parts_used||[]).reduce((s,u)=>s+(+u.cost||0),0),0);
  const cost = Math.round(partsCost + downtime/60*rate);
  const causes = {}; cur.forEach(i=>{if(i.failure_cause) causes[i.failure_cause]=(causes[i.failure_cause]||0)+1;});
  const topCause = Object.entries(causes).sort((a,b)=>b[1]-a[1])[0];
  const slides = [
    {big:"▮▮", t:`MAINTX RÉTRO ${year}`, s:org?.name || ""},
    {big:its.length, t:"interventions cette année", s:`${cur.length} pannes · ${prev.length} préventifs`},
    byM[0]?.n>0 ? {big:byM[0].m.name, t:"la plus capricieuse", s:`${byM[0].n} pannes — on la surveille de près`} : null,
    topCause ? {big:FAILCAUSE[topCause[0]]?.label, t:"cause n°1 des pannes", s:`${topCause[1]} pannes — la piste d'amélioration ${year+1}`} : null,
    downtime>0 ? {big:Math.round(downtime/60)+" h", t:"d'arrêt machine", s:`MTTR moyen : ${mttr} min`} : null,
    cost>0 ? {big:cost.toLocaleString("fr-FR")+" €", t:"de maintenance", s:"pièces + main d'œuvre"} : null,
    {big:"MERCI", t:"à toute l'équipe", s:`Rendez-vous en ${year+1}`},
  ].filter(Boolean);
  const [k,setK] = useState(0);
  useEffect(() => {
    const key = e => {
      if (e.key==="Escape") onClose();
      if (e.key==="ArrowRight") setK(x=>Math.min(slides.length-1,x+1));
      if (e.key==="ArrowLeft") setK(x=>Math.max(0,x-1));
    };
    document.addEventListener("keydown", key);
    return () => document.removeEventListener("keydown", key);
  }, []);
  const s = slides[k];
  return (
    <div style={{position:"fixed",inset:0,background:"var(--ink)",zIndex:100,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",padding:24}}
         onClick={()=>k<slides.length-1 ? setK(k+1) : onClose()}>
      <div style={{position:"absolute",top:20,left:24,fontFamily:"var(--display)",fontSize:16,color:"#fff"}}>
        <span style={{color:"var(--accent)"}}>▮▮</span> MAINT<span style={{color:"var(--accent)"}}>X</span>
      </div>
      <button className="btn ghost sm" style={{position:"absolute",top:20,right:24,color:"#C9CCD1",borderColor:"#444"}}
              onClick={e=>{e.stopPropagation();onClose();}}>✕ Fermer</button>
      <div style={{textAlign:"center",maxWidth:760}}>
        <div style={{fontFamily:"var(--display)",fontSize:s.big && String(s.big).length>12 ? 42 : 88,lineHeight:1.05,color:"var(--accent)",textTransform:"uppercase",wordBreak:"break-word"}}>{s.big}</div>
        <div style={{fontFamily:"var(--display)",fontSize:24,color:"#fff",textTransform:"uppercase",marginTop:18}}>{s.t}</div>
        <div style={{font:"500 15px system-ui",color:"#C9CCD1",marginTop:10}}>{s.s}</div>
      </div>
      <div style={{position:"absolute",bottom:26,display:"flex",gap:6}}>
        {slides.map((_,j)=><span key={j} style={{width:22,height:5,background:j===k?"var(--accent)":"#3B4048"}}/>)}
      </div>
      <div style={{position:"absolute",bottom:44,font:"500 11px system-ui",color:"#5E646E"}}>Cliquez pour avancer</div>
    </div>
  );
}

function HBarChart({data,color,unit,empty}) {
  if (!data.length || data.every(d=>!d.value)) return <Empty>{empty||"Pas encore de données."}</Empty>;
  const max = Math.max(...data.map(d=>d.value),1);
  return (
    <div className="card">
      {data.map((d,k)=>(
        <div key={k} style={{display:"flex",alignItems:"center",gap:10,margin:"6px 0"}}>
          <div style={{width:120,flexShrink:0,font:"600 12px system-ui",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={d.label}>{d.label}</div>
          <div style={{flex:1,background:"var(--bg)",height:20}}>
            <div style={{width:Math.max(2,Math.round(100*d.value/max))+"%",height:"100%",background:color}}/>
          </div>
          <div style={{width:76,flexShrink:0,textAlign:"right",font:"700 12px system-ui"}}>{d.value.toLocaleString("fr-FR")}{unit?" "+unit:""}</div>
        </div>
      ))}
    </div>
  );
}

function BarChart({data,color,empty}) {
  if (!data.length || data.every(d=>!d.value)) return <Empty>{empty||"Pas encore de données."}</Empty>;
  const max = Math.max(...data.map(d=>d.value),1);
  const W=560, H=180, pad=26, bw=Math.min(56,(W-pad)/data.length-10);
  return (
    <div className="card" style={{maxWidth:W+32}}>
      <svg viewBox={`0 0 ${W} ${H+30}`} style={{width:"100%"}}>
        {data.map((d,k)=>{
          const h = Math.round((d.value/max)*(H-pad));
          const x = pad + k*((W-pad)/data.length);
          return (
            <g key={k}>
              <rect x={x} y={H-h} width={bw} height={h} fill={color}/>
              <text x={x+bw/2} y={H-h-6} textAnchor="middle" style={{font:"700 12px system-ui"}}>{d.value}</text>
              <text x={x+bw/2} y={H+16} textAnchor="middle" style={{font:"600 10px system-ui",fill:"#8A8F98"}}>{d.label}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function Dropdown({value,options,onChange,width,align="left",style,placeholder}) {
  const [open,setOpen] = useState(false);
  const ref = useRef();
  useEffect(() => {
    if (!open) return;
    const close = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const esc = e => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("mousedown", close);
    document.addEventListener("keydown", esc);
    return () => { document.removeEventListener("mousedown", close); document.removeEventListener("keydown", esc); };
  }, [open]);
  const sel = options.find(o=>o.value===value);
  return (
    <div ref={ref} style={{position:"relative",width,...style}}>
      <button type="button" className="dd-btn" onClick={()=>setOpen(!open)}>
        {sel?.color && <span className="dd-dot" style={{background:sel.color}}/>}
        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:sel?"var(--ink)":"var(--muted)"}}>{sel?.label ?? placeholder ?? "Sélectionner…"}</span>
        <span className="dd-chev" style={open?{transform:"rotate(180deg)"}:null}>▼</span>
      </button>
      {open && (
        <div className="dd-menu" style={align==="right"?{right:0}:{left:0}}>
          {options.map(o=>(
            <button type="button" key={o.value} className={"dd-opt"+(o.value===value?" sel":"")}
                    onClick={()=>{onChange(o.value);setOpen(false);}}>
              {o.color && <span className="dd-dot" style={{background:o.color}}/>}
              <span style={{flex:1}}>
                {o.label}
                {o.sub && <span className="dd-sub">{o.sub}</span>}
              </span>
              {o.value===value && <span style={{color:"var(--accent)",fontWeight:800}}>✔</span>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function VoiceReport({i,onApplied,db}) {
  const [state,setState] = useState("idle"); // idle | rec | busy | review
  const [text,setText] = useState("");
  const [prop,setProp] = useState(null);
  const [err,setErr] = useState(null);
  const recRef = useRef(null);
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  useEffect(() => () => { recRef.current?.stop(); recRef.current = null; }, []); // coupe le micro au démontage
  const start = () => {
    setErr(null);
    const r = new SR();
    r.lang = "fr-FR"; r.continuous = true; r.interimResults = true;
    let final = text ? text+" " : "";
    r.onresult = e => {
      let interim = "";
      for (let k=e.resultIndex; k<e.results.length; k++) {
        if (e.results[k].isFinal) final += e.results[k][0].transcript + " ";
        else interim += e.results[k][0].transcript;
      }
      setText((final+interim).trim());
    };
    r.onerror = ev => { setErr("Micro : "+ev.error); setState("idle"); };
    r.onend = () => setState(s=>s==="rec"?"idle":s);
    recRef.current = r; r.start(); setState("rec");
  };
  const stop = () => { const r=recRef.current; recRef.current=null; setState("idle"); r?.stop(); };
  const analyze = async () => {
    setState("busy"); setErr(null);
    try {
      const res = await fetch(FN.voice, {
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+SUPABASE_KEY,"apikey":SUPABASE_KEY},
        body:JSON.stringify({transcript:text, title:i.title}),
      });
      const p = await res.json();
      if (!res.ok || p.error) throw new Error(p.error||res.status);
      setProp(p); setState("review");
    } catch(e) {
      setErr("Analyse momentanément indisponible, réessayez dans un instant.");
      setState("idle");
    }
  };
  const apply = async () => {
    setState("busy");
    let body = prop.resume;
    if (prop.pieces?.length) body += "\nPièces : "+prop.pieces.join(", ");
    if (prop.actions_restantes) body += "\nReste à faire : "+prop.actions_restantes;
    await db.addComment(i.id, body);
    if (prop.cause && i.type==="curative") await db.setInterventionCause(i.id, prop.cause);
    await db.setInterventionStatus(i, prop.repare ? "done" : (i.status==="open" ? "in_progress" : i.status));
    setProp(null); setText(""); setState("idle");
    onApplied && onApplied();
  };
  return (
    <div style={{border:"1.5px dashed #C9CCD1",padding:"10px 12px",marginBottom:12,background:"#fff"}}>
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <b style={{font:"700 11px system-ui",textTransform:"uppercase",letterSpacing:".06em"}}>Mode mains sales</b>
        {SR ? (
          state==="rec"
            ? <button className="btn sm" style={{background:"var(--alarm)",color:"#fff"}} onClick={stop}>Stop</button>
            : <button className="btn sm" onClick={start} disabled={state==="busy"}>Dicter</button>
        ) : <span style={{font:"500 11px system-ui",color:"var(--muted)"}}>Dictée non supportée sur ce navigateur (Chrome/Edge ou téléphone) — tapez le texte :</span>}
        {state==="rec" && <span style={{color:"var(--alarm)",font:"700 12px system-ui"}}>● Enregistrement… parlez</span>}
        <button className="btn sm" disabled={!text.trim()||state==="busy"||state==="rec"} onClick={analyze}>
          {state==="busy" ? "Analyse…" : "Analyser"}
        </button>
      </div>
      {(text || state==="rec" || !SR) && (
        <textarea rows={2} value={text} onChange={e=>setText(e.target.value)} style={{marginTop:8}}
                  placeholder="Ex : j'ai remplacé le roulement côté moteur, c'était encrassé, la machine est repartie, prévoir de recommander la référence 6205"/>
      )}
      {err && <div style={{color:"var(--alarm)",font:"600 12px system-ui",marginTop:6}}>{err}</div>}
      {state==="review" && prop && (
        <div style={{background:"var(--bg)",padding:"10px 12px",marginTop:8}}>
          <div style={{font:"700 11px system-ui",textTransform:"uppercase",color:"var(--muted)",marginBottom:4}}>Proposition de l'IA</div>
          <div style={{font:"500 13px system-ui",whiteSpace:"pre-wrap"}}>{prop.resume}</div>
          <div style={{font:"600 12px system-ui",marginTop:8,display:"flex",gap:12,flexWrap:"wrap"}}>
            {prop.cause && <span>Cause : <b style={{color:FAILCAUSE[prop.cause]?.color}}>{FAILCAUSE[prop.cause]?.label||prop.cause}</b></span>}
            <span style={{color:prop.repare?"var(--run)":"var(--warn)",fontWeight:700}}>{prop.repare ? "Machine réparée → clôturée" : "Non réparée → passera « En cours »"}</span>
          </div>
          {prop.pieces?.length>0 && <div style={{font:"500 12px system-ui",marginTop:4}}>Pièces : {prop.pieces.join(", ")}</div>}
          {prop.actions_restantes && <div style={{font:"500 12px system-ui",marginTop:4}}>Reste à faire : {prop.actions_restantes}</div>}
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button className="btn sm" onClick={apply}>✓ Valider</button>
            <button className="btn ghost sm" onClick={()=>{setProp(null);setState("idle");}}>Annuler</button>
          </div>
        </div>
      )}
    </div>
  );
}

      {(i.parts_used||[]).map((u,k)=>(
        <div key={k} style={{font:"600 13px system-ui",padding:"3px 0"}}>
          <span style={{color:"var(--accent)"}}>▮</span> {u.qty}× {u.name}{u.ref?` (${u.ref})`:""}{u.cost?` · ${u.cost} €`:""}
        </div>
      ))}
      {(parts||[]).length>0 ? (
        <div style={{display:"flex",gap:8,alignItems:"center",margin:"6px 0 14px",flexWrap:"wrap"}}>
          <Dropdown width={230} value={partId} placeholder="Choisir une pièce…"
                    options={parts.map(p=>({value:p.id,label:p.name+(p.ref?` (${p.ref})`:""),sub:`stock : ${+p.qty}`}))}
                    onChange={setPartId}/>
          <input type="number" min="1" value={partQty} onChange={e=>setPartQty(Math.max(1,+e.target.value||1))} style={{width:70}}/>
          <button className="btn sm" disabled={!partId}
                  onClick={()=>{const p=parts.find(x=>x.id===partId); if(p){db.usePart(i,p,partQty); setPartId(null); setPartQty(1);}}}>
            Utiliser
          </button>
        </div>
      ) : (
        <div style={{font:"500 12px system-ui",color:"var(--muted)",marginBottom:14}}>
          {(i.parts_used||[]).length===0 && "Aucune pièce — créez votre stock dans « Pièces détachées »."}
        </div>
      )}
      <div style={{font:"700 11px system-ui",textTransform:"uppercase",letterSpacing:".06em",color:"var(--muted)",marginBottom:6}}>Commentaires</div>
      {comments === null && <div style={{font:"500 12px system-ui",color:"var(--muted)"}}>Chargement…</div>}
      {comments?.map(c=>(
        <div key={c.id} style={{marginBottom:8}}>
          <span style={{font:"700 12px system-ui"}}>{c.author?.full_name || "?"}</span>
          <span style={{font:"500 11px system-ui",color:"var(--muted)"}}> · {c.created_at?.slice(0,16).replace("T"," ")}</span>
          <div style={{font:"500 13px system-ui"}}>{c.body}</div>
        </div>
      ))}
      {comments?.length === 0 && <div style={{font:"500 12px system-ui",color:"var(--muted)",marginBottom:8}}>Aucun commentaire.</div>}
      <div style={{display:"flex",gap:8,marginTop:8}}>
        <input placeholder="Ajouter un commentaire (pièce changée, réglage effectué…)" value={txt}
               onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}/>
        <button className="btn sm" disabled={busy||!txt.trim()} onClick={send}>Envoyer</button>
      </div>
    </div>
  );
}

function Modal({title,children,onClose}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(27,29,33,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50}} onClick={onClose}>
      <div style={{background:"#fff",padding:24,width:420,maxWidth:"92vw",borderTop:"5px solid var(--accent)"}} onClick={e=>e.stopPropagation()}>
        <h3 style={{margin:"0 0 16px",fontFamily:"var(--display)",textTransform:"uppercase",letterSpacing:".04em"}}>{title}</h3>
        {children}
      </div>
    </div>
  );
}

function MachineModal({onClose,onSave}) {
  const [f,setF] = useState({name:"",code:"",family:"CN fraisage",crit:2,year:""});
  return (
    <Modal title="Ajouter une machine" onClose={onClose}>
      <input placeholder="Nom (ex: Mori Seiki M300L)" value={f.name} onChange={e=>setF({...f,name:e.target.value})} style={{marginBottom:10}}/>
      <input placeholder="Code parc (ex: FR-08)" value={f.code} onChange={e=>setF({...f,code:e.target.value})} style={{marginBottom:10}}/>
      <input placeholder="Famille (ex: Tour CN)" value={f.family} onChange={e=>setF({...f,family:e.target.value})} style={{marginBottom:10}}/>
      <input placeholder="Année (optionnel)" value={f.year} onChange={e=>setF({...f,year:e.target.value})} style={{marginBottom:10}}/>
      <label style={{font:"600 12px system-ui"}}>Criticité : <span style={{color:CRIT[f.crit].color}}>{CRIT[f.crit].label}</span></label>
      <input type="range" min="1" max="3" value={f.crit} onChange={e=>setF({...f,crit:+e.target.value})} style={{border:0,padding:0}}/>
      <div style={{font:"500 11px system-ui",color:"var(--muted)",marginBottom:4}}>{CRIT[f.crit].desc}</div>
      <button className="btn" disabled={!f.name} onClick={()=>onSave(f)} style={{width:"100%",marginTop:12}}>Enregistrer</button>
    </Modal>
  );
}

function InterventionModal({machines,onClose,onSave}) {
  const [f,setF] = useState({machine:machines[0]?.id,type:"curative",prio:2,title:""});
  return (
    <Modal title="Déclarer une intervention" onClose={onClose}>
      <label style={{font:"500 12px system-ui",color:"var(--muted)"}}>Machine</label>
      <Dropdown style={{marginBottom:10}} value={f.machine}
                options={machines.map(m=>({value:m.id,label:(m.code?m.code+" — ":"")+m.name,sub:m.family}))}
                onChange={v=>setF({...f,machine:v})}/>
      <label style={{font:"500 12px system-ui",color:"var(--muted)"}}>Type d'intervention</label>
      <Dropdown style={{marginBottom:10}} value={f.type}
                options={Object.entries(ITYPE).map(([k,v])=>({value:k,label:v}))}
                onChange={v=>setF({...f,type:v})}/>
      <input placeholder="Description du problème" value={f.title} onChange={e=>setF({...f,title:e.target.value})} style={{marginBottom:10}}/>
      <label style={{font:"500 12px system-ui",color:"var(--muted)"}}>Priorité : {f.prio}/3</label>
      <input type="range" min="1" max="3" value={f.prio} onChange={e=>setF({...f,prio:+e.target.value})} style={{border:0,padding:0}}/>
      <button className="btn" disabled={!f.title||!f.machine} onClick={()=>onSave(f)} style={{width:"100%",marginTop:12}}>Déclarer</button>
    </Modal>
  );
}

function PreventifModal({machines,onClose,onSave}) {
  const [f,setF] = useState({machines:machines[0]?[machines[0].id]:[],title:"",freq:30,freqH:"",next:today(),checklist:[],once:false});
  const [step,setStep] = useState("");
  const addStep = () => { if(!step.trim()) return; setF({...f,checklist:[...f.checklist,step.trim()]}); setStep(""); };
  const toggle = id => setF({...f, machines: f.machines.includes(id) ? f.machines.filter(x=>x!==id) : [...f.machines, id]});
  return (
    <Modal title="Nouvelle gamme préventive" onClose={onClose}>
      <label style={{font:"500 12px system-ui",color:"var(--muted)"}}>Machines concernées ({f.machines.length})</label>
      <div style={{display:"flex",gap:8,margin:"4px 0 6px"}}>
        <button className="btn ghost sm" onClick={()=>setF({...f,machines:machines.map(m=>m.id)})}>Toutes</button>
        <button className="btn ghost sm" onClick={()=>setF({...f,machines:[]})}>Aucune</button>
      </div>
      <div style={{maxHeight:150,overflow:"auto",border:"1px solid #E3E5E8",marginBottom:10}}>
        {machines.map(m=>(
          <label key={m.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderBottom:"1px solid #EEE",cursor:"pointer",font:"600 13px system-ui",background:f.machines.includes(m.id)?"rgba(255,196,0,.10)":"#fff"}}>
            <input type="checkbox" checked={f.machines.includes(m.id)} onChange={()=>toggle(m.id)} style={{width:16,height:16,margin:0}}/>
            {(m.code?m.code+" — ":"")+m.name}
          </label>
        ))}
      </div>
      <input placeholder="Titre (ex: Contrôle niveaux + graissage)" value={f.title} onChange={e=>setF({...f,title:e.target.value})} style={{marginBottom:10}}/>
      <label style={{display:"flex",alignItems:"center",gap:8,font:"600 13px system-ui",margin:"2px 0 10px",cursor:"pointer"}}>
        <input type="checkbox" checked={f.once} style={{width:17,height:17,margin:0}} onChange={e=>setF({...f,once:e.target.checked})}/>
        Une seule fois (pas de périodicité) — la tâche disparaît une fois faite
      </label>
      {!f.once && <>
        <label style={{font:"500 12px system-ui",color:"var(--muted)"}}>Périodicité (jours)</label>
        <input type="number" min="1" value={f.freq} onChange={e=>setF({...f,freq:+e.target.value})} style={{marginBottom:10}}/>
        <label style={{font:"500 12px system-ui",color:"var(--muted)"}}>Ou au compteur (heures machine, optionnel — ex: 500)</label>
        <input type="number" min="1" placeholder="—" value={f.freqH} onChange={e=>setF({...f,freqH:e.target.value})} style={{marginBottom:10}}/>
      </>}
      <label style={{font:"500 12px system-ui",color:"var(--muted)"}}>Première échéance</label>
      <input type="date" value={f.next} onChange={e=>setF({...f,next:e.target.value})} style={{marginBottom:10}}/>
      <label style={{font:"500 12px system-ui",color:"var(--muted)"}}>Checklist (optionnel) — points que le technicien cochera</label>
      {f.checklist.map((s,k)=>(
        <div key={k} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",font:"600 13px system-ui"}}>
          <span style={{color:"var(--accent)"}}>▮</span><span style={{flex:1}}>{s}</span>
          <button className="btn ghost sm" onClick={()=>setF({...f,checklist:f.checklist.filter((_,j)=>j!==k)})}>✕</button>
        </div>
      ))}
      <div style={{display:"flex",gap:8,margin:"6px 0 10px"}}>
        <input placeholder="Point de contrôle (ex: Vérifier niveau d'huile)" value={step}
               onChange={e=>setStep(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addStep();}}}/>
        <button className="btn sm" disabled={!step.trim()} onClick={addStep}>+</button>
      </div>
      <button className="btn" disabled={!f.title||!f.machines.length} onClick={()=>onSave({...f, freq:f.once?0:f.freq, freqH:f.once?"":f.freqH})} style={{width:"100%",marginTop:6}}>
        Créer{f.machines.length>1?` sur ${f.machines.length} machines`:""}
      </button>
    </Modal>
  );
}

function OrgModal({onClose,onSave}) {
  const [name,setName] = useState("");
  return (
    <Modal title="Nouveau client" onClose={onClose}>
      <input placeholder="Nom de l'entreprise" value={name} onChange={e=>setName(e.target.value)} style={{marginBottom:12}}/>
      <button className="btn" disabled={!name} onClick={()=>onSave(name)} style={{width:"100%"}}>Créer</button>
    </Modal>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
