<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaintX — GMAO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg:#EBECEE; --panel:#fff; --ink:#1B1D21; --muted:#8A8F98;
    --accent:#FFC400; --run:#1FA254; --warn:#E8940A; --alarm:#D63B2F;
    --display:'Arial Black','Helvetica Neue',system-ui,sans-serif;
  }
  *{box-sizing:border-box} body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--ink)}
  .nav{display:block;width:100%;text-align:left;padding:11px 16px;border:0;background:transparent;color:#C9CCD1;font:600 13px system-ui;cursor:pointer;border-left:3px solid transparent}
  .nav:hover{color:#fff}
  .nav.active{color:var(--accent);border-left-color:var(--accent);background:rgba(255,196,0,.06)}
  .btn{background:var(--ink);color:var(--accent);border:0;padding:10px 18px;font:700 13px system-ui;text-transform:uppercase;letter-spacing:.05em;cursor:pointer}
  .btn:hover{background:#000}.btn:disabled{opacity:.4;cursor:default}
  .btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
  .btn.sm{padding:6px 12px;font-size:11px}
  .andon{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;padding:4px 8px}
  .andon-code{font:700 10px ui-monospace,monospace;color:var(--muted);letter-spacing:.05em}
  .lamp{width:14px;height:34px;border-radius:7px;display:inline-block;box-shadow:inset 0 -6px 8px rgba(0,0,0,.18),0 0 0 2px rgba(0,0,0,.08)}
  .lamp.lg{width:16px;height:40px}
  .lamp.blink{animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:.25}}
  @media (prefers-reduced-motion:reduce){.lamp.blink{animation:none}}
  input,select,textarea{padding:10px 12px;border:1.5px solid #D5D8DC;font:500 14px system-ui;width:100%;background:#fff}
  select.inline{width:auto;font:600 12px system-ui;padding:7px 10px}
  .dd-btn{display:flex;align-items:center;gap:9px;width:100%;background:#fff;border:1.5px solid #D5D8DC;padding:9px 12px;font:600 13px system-ui;color:var(--ink);cursor:pointer;text-align:left}
  .dd-btn:hover{border-color:var(--ink)}
  .dd-btn:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  .dd-chev{margin-left:auto;color:var(--accent);font-size:11px;transition:transform .15s}
  .dd-menu{position:absolute;top:calc(100% + 4px);min-width:100%;background:#fff;border:1.5px solid var(--ink);box-shadow:0 10px 28px rgba(27,29,33,.22);z-index:60;max-height:300px;overflow:auto}
  .dd-opt{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border:0;border-left:3px solid transparent;background:transparent;font:600 13px system-ui;color:var(--ink);cursor:pointer;text-align:left}
  .dd-opt:hover{background:rgba(255,196,0,.14);border-left-color:var(--accent)}
  .dd-opt.sel{border-left-color:var(--accent);font-weight:800}
  .dd-dot{width:9px;height:18px;border-radius:5px;flex:none;box-shadow:inset 0 -3px 4px rgba(0,0,0,.18),0 0 0 1.5px rgba(0,0,0,.08)}
  .dd-sub{display:block;font:500 11px system-ui;color:var(--muted);margin-top:1px}
  .tab{border:0;background:transparent;padding:10px 14px;font:700 12px system-ui;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent}
  .tab.active{color:var(--ink);border-bottom-color:var(--accent)}
  .doccat{font:700 10px system-ui;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;color:#fff}
  .card{background:var(--panel);padding:16px}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
/* ============================================================
   MaintX v0.3 — QR · Documents · Fiche machine · Préventif · Analyse
   ============================================================ */
const SUPABASE_URL = "https://krfrzuxdymgzttkdcaab.supabase.co";
const SUPABASE_KEY = "sb_publishable_KXSWUiTsFqU6aDf67rF51g_t_px3jkt";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const { useState, useEffect, useMemo, useRef } = React;

const STATUS = {
  running:{label:"En marche",color:"var(--run)"},
  stopped:{label:"Arrêtée",color:"var(--muted)"},
  maintenance:{label:"En maintenance",color:"var(--warn)"},
  alarm:{label:"En panne",color:"var(--alarm)"},
};
const ITYPE = {curative:"Curatif",preventive:"Préventif",improvement:"Amélioratif"};
const ISTATUS = {
  open:{label:"Ouverte",color:"var(--alarm)"},
  in_progress:{label:"En cours",color:"var(--warn)"},
  waiting_parts:{label:"Attente pièces",color:"var(--muted)"},
  done:{label:"Clôturée",color:"var(--run)"},
};
const CRIT = {
  1:{label:"Secondaire",desc:"Un arrêt ne bloque pas la production",color:"var(--muted)"},
  2:{label:"Importante",desc:"Un arrêt gêne la production mais reste contournable",color:"var(--warn)"},
  3:{label:"Critique",desc:"Un arrêt stoppe la production ou pose un risque sécurité",color:"var(--alarm)"},
};
const DOCCAT = {
  electrique:{label:"Électrique",color:"#B3541E"},
  pneumatique:{label:"Pneumatique",color:"#2C74B3"},
  hydraulique:{label:"Hydraulique",color:"#144272"},
  maintenance:{label:"Maintenance",color:"#1FA254"},
  autre:{label:"Autre",color:"#8A8F98"},
};
const today = () => new Date().toISOString().slice(0,10);
const addDays = (d,n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x.toISOString().slice(0,10); };

/* ------------------------- ROOT + routing ------------------------- */
function Root() {
  const [hash,setHash] = useState(window.location.hash);
  useEffect(() => {
    const on = () => setHash(window.location.hash);
    window.addEventListener("hashchange", on);
    return () => window.removeEventListener("hashchange", on);
  }, []);
  // Page publique QR : #/qr/<token> — pas besoin de compte
  const qrMatch = hash.match(/^#\/qr\/([0-9a-f-]{36})/i);
  if (qrMatch) return <QRPage token={qrMatch[1]}/>;
  return <AuthGate/>;
}

function AuthGate() {
  const [session,setSession] = useState(undefined);
  useEffect(() => {
    sb.auth.getSession().then(({data})=>setSession(data.session));
    const {data:{subscription}} = sb.auth.onAuthStateChange((_e,s)=>setSession(s));
    return () => subscription.unsubscribe();
  }, []);
  if (session === undefined) return <Center>Chargement…</Center>;
  if (!session) return <Login/>;
  return <App session={session}/>;
}

function Center({children}) {
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>{children}</div>;
}

/* ------------------------- PAGE PUBLIQUE QR ------------------------- */
function QRPage({token}) {
  const [machine,setMachine] = useState(undefined);
  const [name,setName] = useState("");
  const [desc,setDesc] = useState("");
  const [state,setState] = useState("form"); // form | sending | done | error
  useEffect(() => { (async () => {
    const {data,error} = await sb.rpc("qr_get_machine",{qr:token});
    setMachine(error || !data?.length ? null : data[0]);
  })(); }, []);
  const send = async () => {
    setState("sending");
    const {error} = await sb.rpc("qr_declare",{qr:token, p_title:desc, p_name:name});
    setState(error ? "error" : "done");
  };
  if (machine === undefined) return <Center>Chargement…</Center>;
  if (machine === null) return <Center><div style={{font:"600 14px system-ui",color:"var(--alarm)"}}>QR code invalide ou machine supprimée.</div></Center>;
  return (
    <Center>
      <div style={{background:"#fff",padding:28,width:420,maxWidth:"94vw",borderTop:"5px solid var(--accent)"}}>
        <div style={{fontFamily:"var(--display)",fontSize:18,marginBottom:2}}>
          <span style={{color:"var(--accent)"}}>▮▮</span> MAINT<span style={{color:"var(--accent)"}}>X</span>
        </div>
        <div style={{font:"600 11px system-ui",textTransform:"uppercase",letterSpacing:".1em",color:"var(--muted)",marginBottom:20}}>
          Déclaration de panne · {machine.org_name}
        </div>
        <div style={{background:"var(--bg)",padding:"12px 16px",marginBottom:18}}>
          <div style={{font:"700 10px ui-monospace,monospace",color:"var(--muted)",textTransform:"uppercase"}}>{machine.code} · {machine.family}</div>
          <div style={{fontWeight:800,fontSize:17}}>{machine.name}</div>
        </div>
        {state === "done" ? (
          <div style={{textAlign:"center",padding:"16px 0"}}>
            <div style={{fontSize:40}}>✓</div>
            <div style={{font:"700 15px system-ui",color:"var(--run)"}}>Panne déclarée</div>
            <div style={{font:"500 13px system-ui",color:"var(--muted)",marginTop:6}}>L'équipe maintenance est prévenue.</div>
          </div>
        ) : (
          <>
            <textarea placeholder="Décrivez le problème (ex: alarme broche, fuite d'huile…)" rows={3}
                      value={desc} onChange={e=>setDesc(e.target.value)} style={{marginBottom:10}}/>
            <input placeholder="Votre nom (optionnel)" value={name} onChange={e=>setName(e.target.value)} style={{marginBottom:14}}/>
            {state === "error" && <div style={{color:"var(--alarm)",font:"600 12px system-ui",marginBottom:10}}>Erreur d'envoi — réessayez.</div>}
            <button className="btn" style={{width:"100%",padding:"14px"}} disabled={!desc || state==="sending"} onClick={send}>
              {state === "sending" ? "Envoi…" : "🔴 Déclarer la panne"}
            </button>
          </>
        )}
      </div>
    </Center>
  );
}

/* ------------------------- LOGIN ------------------------- */
function Login() {
  const [email,setEmail] = useState("");
  const [pwd,setPwd] = useState("");
  const [err,setErr] = useState(null);
  const [busy,setBusy] = useState(false);
  const go = async () => {
    setBusy(true); setErr(null);
    const {error} = await sb.auth.signInWithPassword({email, password:pwd});
    if (error) setErr("Identifiants incorrects ou compte inexistant.");
    setBusy(false);
  };
  return (
    <Center>
      <div style={{background:"#fff",padding:32,width:380,borderTop:"5px solid var(--accent)"}}>
        <div style={{fontFamily:"var(--display)",fontSize:24,marginBottom:4}}>
          <span style={{color:"var(--accent)"}}>▮▮</span> MAINT<span style={{color:"var(--accent)"}}>X</span>
        </div>
        <div style={{font:"600 11px system-ui",textTransform:"uppercase",letterSpacing:".1em",color:"var(--muted)",marginBottom:24}}>GMAO · Connexion</div>
        <input placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} style={{marginBottom:10}}/>
        <input placeholder="Mot de passe" type="password" value={pwd} onChange={e=>setPwd(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} style={{marginBottom:14}}/>
        {err && <div style={{color:"var(--alarm)",font:"600 12px system-ui",marginBottom:12}}>{err}</div>}
        <button className="btn" style={{width:"100%"}} disabled={busy||!email||!pwd} onClick={go}>{busy?"Connexion…":"Se connecter"}</button>
        <div style={{font:"500 11px system-ui",color:"var(--muted)",marginTop:16}}>Les comptes sont créés par votre administrateur MaintX.</div>
      </div>
    </Center>
  );
}

/* ------------------------- APP ------------------------- */
function App({session}) {
  const [profile,setProfile] = useState(null);
  const [orgs,setOrgs] = useState([]);
  const [orgId,setOrgId] = useState(null);
  const [machines,setMachines] = useState([]);
  const [interventions,setInterventions] = useState([]);
  const [preventifs,setPreventifs] = useState([]);
  const [docs,setDocs] = useState([]);
  const [view,setView] = useState({name:"dashboard"});
  const [modal,setModal] = useState(null);
  const [error,setError] = useState(null);

  const isSuper = profile?.role === "superadmin";
  const org = orgs.find(o=>o.id===orgId);

  useEffect(() => { (async () => {
    const {data:p,error:e1} = await sb.from("profiles").select("*").eq("id",session.user.id).single();
    if (e1 || !p) { setError("Profil introuvable. L'administrateur doit créer votre profil."); return; }
    setProfile(p);
    const {data:o} = await sb.from("organizations").select("*").order("name");
    setOrgs(o||[]);
    setOrgId(p.org_id || (o&&o[0]?.id) || null);
  })(); }, []);

  const refresh = async () => {
    if (!orgId) return;
    const [m,i,p,d] = await Promise.all([
      sb.from("machines").select("*").eq("org_id",orgId).order("code"),
      sb.from("interventions").select("*").eq("org_id",orgId).order("reported_at",{ascending:false}),
      sb.from("preventive_plans").select("*").eq("org_id",orgId).order("next_due"),
      sb.from("machine_documents").select("*").eq("org_id",orgId).order("created_at",{ascending:false}),
    ]);
    setMachines(m.data||[]); setInterventions(i.data||[]); setPreventifs(p.data||[]); setDocs(d.data||[]);
  };
  useEffect(() => { refresh(); }, [orgId]);

  /* --- Actions --- */
  const db = {
    addMachine: async f => { await sb.from("machines").insert({org_id:orgId,name:f.name,code:f.code,family:f.family,criticality:f.crit,meta:{year:f.year,specs:{}}}); refresh(); setModal(null); },
    updateMachineMeta: async (id,meta) => { await sb.from("machines").update({meta}).eq("id",id); refresh(); },
    addIntervention: async f => { await sb.from("interventions").insert({org_id:orgId,machine_id:f.machine,type:f.type,priority:f.prio,title:f.title,reported_by:profile.id}); refresh(); setModal(null); },
    setInterventionStatus: async (id,st) => {
      const patch = {status:st};
      if (st==="in_progress") patch.started_at = new Date().toISOString();
      if (st==="done") patch.finished_at = new Date().toISOString();
      await sb.from("interventions").update(patch).eq("id",id); refresh();
    },
    setMachineStatus: async (id,st) => { await sb.from("machines").update({status:st}).eq("id",id); refresh(); },
    addOrg: async name => {
      const slug = name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
      await sb.from("organizations").insert({name,slug});
      const {data:o} = await sb.from("organizations").select("*").order("name");
      setOrgs(o||[]); setModal(null);
    },
    addPreventif: async f => { await sb.from("preventive_plans").insert({org_id:orgId,machine_id:f.machine,title:f.title,freq_days:f.freq,next_due:f.next}); refresh(); setModal(null); },
    donePreventif: async p => {
      await sb.from("preventive_plans").update({next_due:addDays(today(),p.freq_days)}).eq("id",p.id);
      await sb.from("interventions").insert({org_id:orgId,machine_id:p.machine_id,type:"preventive",priority:1,title:p.title,status:"done",reported_by:profile.id,started_at:new Date().toISOString(),finished_at:new Date().toISOString()});
      refresh();
    },
    uploadDoc: async (machineId, file, category) => {
      const path = `${orgId}/${machineId}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,"_")}`;
      const {error:e1} = await sb.storage.from("docs").upload(path, file);
      if (e1) { alert("Erreur upload : "+e1.message); return; }
      await sb.from("machine_documents").insert({org_id:orgId,machine_id:machineId,category,name:file.name,storage_path:path,uploaded_by:profile.id});
      refresh();
    },
    openDoc: async d => {
      const {data,error} = await sb.storage.from("docs").createSignedUrl(d.storage_path, 3600);
      if (error) { alert("Erreur d'accès au document"); return; }
      window.open(data.signedUrl, "_blank");
    },
    deleteDoc: async d => {
      if (!confirm(`Supprimer "${d.name}" ?`)) return;
      await sb.storage.from("docs").remove([d.storage_path]);
      await sb.from("machine_documents").delete().eq("id",d.id);
      refresh();
    },
  };

  /* --- KPI --- */
  const kpi = useMemo(() => {
    const pannes = machines.filter(m=>m.status==="alarm").length;
    const ouvertes = interventions.filter(i=>i.status!=="done").length;
    const done = interventions.filter(i=>i.started_at && i.finished_at);
    const mttr = done.length ? Math.round(done.reduce((a,i)=>a+(new Date(i.finished_at)-new Date(i.started_at))/60000,0)/done.length) : null;
    const retard = preventifs.filter(p=>p.active && p.next_due<=today()).length;
    const d90 = new Date(Date.now()-90*864e5).toISOString();
    const counts = {};
    interventions.filter(i=>i.type==="curative" && i.reported_at>d90).forEach(i=>{counts[i.machine_id]=(counts[i.machine_id]||0)+1;});
    const chroniques = Object.entries(counts).filter(([,n])=>n>=3).map(([mid,n])=>({m:machines.find(x=>x.id===mid),n}));
    return {pannes,ouvertes,mttr,retard,chroniques};
  }, [machines,interventions,preventifs]);

  const machineName = id => machines.find(m=>m.id===id)?.name || "?";

  if (error) return <Center><div style={{textAlign:"center"}}><div style={{color:"var(--alarm)",font:"600 14px system-ui",marginBottom:16}}>{error}</div><button className="btn" onClick={()=>sb.auth.signOut()}>Se déconnecter</button></div></Center>;
  if (!profile || !orgId) return <Center>Chargement…</Center>;

  const NAV = [["dashboard","Tableau de bord"],["parc","Parc machines"],["interventions","Interventions"],["preventif","Préventif"],["analyse","Analyse"],...(isSuper?[["admin","Admin clients"]]:[])];

  return (
    <div style={{display:"flex",minHeight:"100vh"}}>
      <aside style={{width:210,background:"var(--ink)",display:"flex",flexDirection:"column",padding:"20px 0",position:"sticky",top:0,height:"100vh"}}>
        <div style={{fontFamily:"var(--display)",fontSize:20,color:"#fff",padding:"0 16px 24px"}}>
          <span style={{color:"var(--accent)",marginRight:6}}>▮▮</span>MAINT<span style={{color:"var(--accent)"}}>X</span>
        </div>
        {NAV.map(([k,label])=>(
          <button key={k} className={"nav"+(view.name===k?" active":"")} onClick={()=>setView({name:k})}>{label}</button>
        ))}
        <div style={{marginTop:"auto",padding:12,font:"500 11px system-ui",color:"var(--muted)"}}>
          {profile.full_name}<br/>{profile.role}
          <button className="btn ghost" style={{width:"100%",marginTop:8,color:"#C9CCD1",borderColor:"#444"}} onClick={()=>sb.auth.signOut()}>Déconnexion</button>
        </div>
      </aside>

      <main style={{flex:1,padding:"28px 36px",maxWidth:1100}}>
        <header style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:24}}>
          <div>
            <div style={{font:"700 10px system-ui",textTransform:"uppercase",letterSpacing:".12em",color:"var(--muted)",marginBottom:4}}>
              Plan {org?.plan==="connect"?"Connect · machines connectées":"Standard"}
            </div>
            <h1 style={{fontFamily:"var(--display)",fontSize:26,margin:0,textTransform:"uppercase"}}>{org?.name}</h1>
          </div>
          {isSuper && orgs.length>1 && (
            <div>
              <div style={{font:"700 10px system-ui",textTransform:"uppercase",letterSpacing:".12em",color:"var(--muted)",marginBottom:4,textAlign:"right"}}>Client</div>
              <Dropdown width={230} align="right" value={orgId}
                        options={orgs.map(o=>({value:o.id,label:o.name,sub:"plan "+(o.plan||"standard")}))}
                        onChange={id=>{setOrgId(id);setView({name:"dashboard"});}}/>
            </div>
          )}
        </header>

        {view.name==="dashboard" && <Dashboard machines={machines} interventions={interventions} kpi={kpi} machineName={machineName} db={db} setView={setView}/>}
        {view.name==="parc" && <Parc machines={machines} setModal={setModal} setView={setView}/>}
        {view.name==="machine" && <MachineDetail machine={machines.find(m=>m.id===view.id)} docs={docs.filter(d=>d.machine_id===view.id)} interventions={interventions.filter(i=>i.machine_id===view.id)} db={db} back={()=>setView({name:"parc"})}/>}
        {view.name==="interventions" && <>
          <Toolbar><H2>Interventions</H2><button className="btn" onClick={()=>setModal("intervention")}>+ Déclarer</button></Toolbar>
          {interventions.map(i=><IRow key={i.id} i={i} machineName={machineName} db={db} full/>)}
          {interventions.length===0 && <Empty>Aucune intervention déclarée.</Empty>}
        </>}
        {view.name==="preventif" && <Preventif preventifs={preventifs} machineName={machineName} db={db} setModal={setModal}/>}
        {view.name==="analyse" && <Analyse machines={machines} interventions={interventions}/>}
        {view.name==="admin" && isSuper && <>
          <Toolbar><H2>Clients ({orgs.length})</H2><button className="btn" onClick={()=>setModal("org")}>+ Nouveau client</button></Toolbar>
          {orgs.map(o=>(
            <Row key={o.id}>
              <div style={{flex:1}}><b>{o.name}</b><div style={{font:"500 12px system-ui",color:"var(--muted)"}}>plan {o.plan} · {o.slug}</div></div>
              <button className="btn ghost sm" onClick={()=>{setOrgId(o.id);setView({name:"dashboard"});}}>Ouvrir →</button>
            </Row>
          ))}
        </>}
      </main>

      {modal==="machine" && <MachineModal onClose={()=>setModal(null)} onSave={db.addMachine}/>}
      {modal==="intervention" && <InterventionModal machines={machines} onClose={()=>setModal(null)} onSave={db.addIntervention}/>}
      {modal==="org" && <OrgModal onClose={()=>setModal(null)} onSave={db.addOrg}/>}
      {modal==="preventif" && <PreventifModal machines={machines} onClose={()=>setModal(null)} onSave={db.addPreventif}/>}
    </div>
  );
}

/* ------------------------- VUES ------------------------- */
function Dashboard({machines,interventions,kpi,machineName,db,setView}) {
  return <>
    <div style={{display:"flex",gap:4,flexWrap:"wrap",background:"var(--panel)",padding:"14px 16px 10px",borderBottom:"3px solid var(--accent)",marginBottom:20}}>
      {machines.length===0 && <span style={{font:"500 13px system-ui",color:"var(--muted)"}}>Aucune machine — ajoutez votre parc dans « Parc machines ».</span>}
      {machines.map(m=>(

function Specs({machine,db}) {

  return (
    <div className="card" style={{maxWidth:560}}>
      <div style={{font:"600 12px system-ui",color:"var(--muted)",marginBottom:12}}>

        (tension, pression pneumatique, type de CN, puissance, n° série…).
      </div>
      {Object.entries(specs).map(([key,val])=>(
        <div key={key} style={{display:"flex",gap:8,alignItems:"center",padding:"6px 0",borderBottom:"1px solid #EEE"}}>

        </div>

function QRTab({machine}) {
  const ref = useRef();
  const url = window.location.origin + window.location.pathname + "#/qr/" + machine.qr_token;
  useEffect(() => {
    ref.current.innerHTML = "";
    new QRCode(ref.current, {text:url, width:180, height:180, correctLevel:QRCode.CorrectLevel.M});
  }, [machine.id]);
  const print = () => {
    const img = ref.current.querySelector("img")?.src || ref.current.querySelector("canvas")?.toDataURL();
    const w = window.open("","_blank","width=400,height=520");
    w.document.write(`<div style="text-align:center;font-family:sans-serif;padding:20px">
      <div style="font-weight:900;font-size:20px">⚠ PANNE MACHINE ?</div>
      <div style="font-size:13px;margin:4px 0 14px">Scannez pour prévenir la maintenance</div>
      <img src="${img}" style="width:220px"/>
      <div style="font-weight:800;font-size:16px;margin-top:12px">${machine.code||""} — ${machine.name}</div>
      <div style="font-size:11px;color:#888;margin-top:16px">MaintX</div>
    </div>`);
    w.document.close(); w.focus(); setTimeout(()=>w.print(), 300);
  };
  return (
    <div className="card" style={{maxWidth:420,textAlign:"center"}}>
      <div ref={ref} style={{display:"inline-block",padding:12,background:"#fff"}}/>
      <div style={{font:"700 14px system-ui",marginTop:8}}>{machine.code} — {machine.name}</div>
      <div style={{font:"500 11px system-ui",color:"var(--muted)",margin:"6px 0 14px",wordBreak:"break-all"}}>{url}</div>
      <button className="btn" onClick={print}>🖨 Imprimer l'étiquette</button>
      <div style={{font:"500 11px system-ui",color:"var(--muted)",marginTop:12}}>
        À coller sur la machine. Toute personne qui scanne peut déclarer une panne, sans compte.
      </div>
    </div>
  );
}

/* ------------------------- ANALYSE ------------------------- */
function Analyse({machines,interventions}) {
  const doneWithTime = interventions.filter(i=>i.started_at&&i.finished_at);
  // Temps d'arrêt par machine (min)
  const downtimeByMachine = machines.map(m=>({
    label: m.code||m.name.slice(0,10),
    value: Math.round(doneWithTime.filter(i=>i.machine_id===m.id).reduce((a,i)=>a+(new Date(i.finished_at)-new Date(i.started_at))/60000,0))
  })).filter(x=>x.value>0).sort((a,b)=>b.value-a.value).slice(0,8);
  // Interventions par mois (6 derniers)
  const months = [...Array(6)].map((_,k)=>{
    const d = new Date(); d.setMonth(d.getMonth()-(5-k));
    const key = d.toISOString().slice(0,7);
    return {label:key.slice(5)+"/"+key.slice(2,4), value:interventions.filter(i=>i.reported_at?.slice(0,7)===key).length};
  });
  // Répartition par type
  const byType = Object.entries(ITYPE).map(([k,v])=>({label:v, value:interventions.filter(i=>i.type===k).length})).filter(x=>x.value>0);
  const total = interventions.length;

  return <>
    <H2>Temps d'arrêt par machine (minutes)</H2>
    <BarChart data={downtimeByMachine} color="var(--alarm)" empty="Pas encore de temps d'arrêt mesuré — passez des interventions En cours → Clôturée."/>
    <H2>Interventions par mois</H2>
    <BarChart data={months} color="var(--ink)"/>
    <H2>Répartition par type</H2>
    {total>0 ? (
      <div className="card" style={{maxWidth:560}}>
        {byType.map(t=>(
          <div key={t.label} style={{margin:"8px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",font:"600 12px system-ui",marginBottom:3}}>
              <span>{t.label}</span><span>{t.value} ({Math.round(100*t.value/total)}%)</span>
            </div>
            <div style={{background:"var(--bg)",height:12}}>
              <div style={{width:(100*t.value/total)+"%",height:"100%",background:t.label==="Curatif"?"var(--alarm)":t.label==="Préventif"?"var(--run)":"var(--warn)"}}/>
            </div>
          </div>
        ))}
        <div style={{font:"500 11px system-ui",color:"var(--muted)",marginTop:10}}>
          Objectif d'une bonne maintenance : faire monter la part de préventif au-dessus du curatif.
        </div>
      </div>
    ) : <Empty>Pas encore de données.</Empty>}
  </>;
}

function BarChart({data,color,empty}) {
  if (!data.length || data.every(d=>!d.value)) return <Empty>{empty||"Pas encore de données."}</Empty>;
  const max = Math.max(...data.map(d=>d.value),1);
  const W=560, H=180, pad=26, bw=Math.min(56,(W-pad)/data.length-10);
  return (
    <div className="card" style={{maxWidth:W+32}}>
      <svg viewBox={`0 0 ${W} ${H+30}`} style={{width:"100%"}}>
        {data.map((d,k)=>{
          const h = Math.round((d.value/max)*(H-pad));
          const x = pad + k*((W-pad)/data.length);
          return (
            <g key={k}>
              <rect x={x} y={H-h} width={bw} height={h} fill={color}/>
              <text x={x+bw/2} y={H-h-6} textAnchor="middle" style={{font:"700 12px system-ui"}}>{d.value}</text>
              <text x={x+bw/2} y={H+16} textAnchor="middle" style={{font:"600 10px system-ui",fill:"#8A8F98"}}>{d.label}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

/* ------------------- Petits composants ------------------- */
function Dropdown({value,options,onChange,width,align="left",style}) {
  const [open,setOpen] = useState(false);
  const ref = useRef();
  useEffect(() => {
    if (!open) return;
    const close = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const esc = e => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("mousedown", close);
    document.addEventListener("keydown", esc);
    return () => { document.removeEventListener("mousedown", close); document.removeEventListener("keydown", esc); };
  }, [open]);
  const sel = options.find(o=>o.value===value);
  return (
    <div ref={ref} style={{position:"relative",width,...style}}>
      <button type="button" className="dd-btn" onClick={()=>setOpen(!open)}>
        {sel?.color && <span className="dd-dot" style={{background:sel.color}}/>}
        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sel?.label ?? "Sélectionner…"}</span>
        <span className="dd-chev" style={open?{transform:"rotate(180deg)"}:null}>▼</span>
      </button>
      {open && (
        <div className="dd-menu" style={align==="right"?{right:0}:{left:0}}>
          {options.map(o=>(
            <button type="button" key={o.value} className={"dd-opt"+(o.value===value?" sel":"")}
                    onClick={()=>{onChange(o.value);setOpen(false);}}>
              {o.color && <span className="dd-dot" style={{background:o.color}}/>}
              <span style={{flex:1}}>
                {o.label}
                {o.sub && <span className="dd-sub">{o.sub}</span>}
              </span>
              {o.value===value && <span style={{color:"var(--accent)",fontWeight:800}}>✔</span>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

      <input placeholder="Titre (ex: Contrôle niveaux + graissage)" value={f.title} onChange={e=>setF({...f,title:e.target.value})} style={{marginBottom:10}}/>
      <label style={{font:"500 12px system-ui",color:"var(--muted)"}}>Périodicité (jours)</label>
      <input type="number" min="1" value={f.freq} onChange={e=>setF({...f,freq:+e.target.value})} style={{marginBottom:10}}/>
      <label style={{font:"500 12px system-ui",color:"var(--muted)"}}>Première échéance</label>
      <input type="date" value={f.next} onChange={e=>setF({...f,next:e.target.value})} style={{marginBottom:10}}/>
      <button className="btn" disabled={!f.title||!f.machine} onClick={()=>onSave(f)} style={{width:"100%",marginTop:6}}>Créer</button>
    </Modal>
  );
}

function OrgModal({onClose,onSave}) {
  const [name,setName] = useState("");
  return (
    <Modal title="Nouveau client" onClose={onClose}>
      <input placeholder="Nom de l'entreprise" value={name} onChange={e=>setName(e.target.value)} style={{marginBottom:12}}/>
      <button className="btn" disabled={!name} onClick={()=>onSave(name)} style={{width:"100%"}}>Créer</button>
    </Modal>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
